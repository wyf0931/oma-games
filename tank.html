<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANK COMMAND — 坦克大战</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0b1007;
            --bg-panel: #111a0c;
            --bg-card: #162212;
            --olive: #3a4f28;
            --olive-light: #5a7540;
            --amber: #d4a017;
            --amber-glow: #f0c040;
            --danger: #cc3a2f;
            --danger-glow: #ff5544;
            --tactical-green: #2ecc40;
            --tactical-green-glow: #44ff55;
            --text-primary: #c8ccbe;
            --text-dim: #6b7260;
            --text-data: #9aab7c;
            --border: #2a3320;
            --border-accent: #4a5a30;
            --scanline-opacity: 0.04;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: crosshair;
        }

        /* --- Background texture layers --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(58, 79, 40, 0.03) 2px,
                    rgba(58, 79, 40, 0.03) 4px
                );
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 20%, rgba(58, 79, 40, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 70%, rgba(212, 160, 23, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 0%, rgba(0, 0, 0, 0.3) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- Noise overlay --- */
        .noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* --- Main container --- */
        #container {
            position: relative;
            z-index: 2;
            display: flex;
            gap: 0;
            align-items: stretch;
            animation: containerEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes containerEntry {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* --- Game area --- */
        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 18px 14px;
            background: #080c05;
            border: 2px solid var(--border);
            border-right: none;
            position: relative;
        }

        /* Tactical corners on game area */
        #game-area::before,
        #game-area::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: var(--amber);
            border-style: solid;
            z-index: 3;
            pointer-events: none;
        }
        #game-area::before {
            top: 8px;
            left: 8px;
            border-width: 2px 0 0 2px;
        }
        #game-area::after {
            bottom: 8px;
            right: 8px;
            border-width: 0 2px 2px 0;
        }

        /* HUD status bar */
        #hud {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 6px 14px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            letter-spacing: 1px;
            position: relative;
        }

        #hud .hud-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #hud .hud-label {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 2px;
        }

        #hud .hud-value {
            font-size: 18px;
            font-weight: bold;
            min-width: 24px;
            text-align: right;
        }

        .hud-hp { color: var(--danger); text-shadow: 0 0 8px rgba(204, 58, 47, 0.5); }
        .hud-enemies { color: var(--tactical-green); text-shadow: 0 0 8px rgba(46, 204, 64, 0.4); }
        .hud-diff { color: var(--amber); text-shadow: 0 0 8px rgba(212, 160, 23, 0.4); }
        .hud-sep {
            width: 1px;
            height: 20px;
            background: var(--border-accent);
            margin: 0 4px;
        }

        /* Blinking dot for active game */
        .hud-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--tactical-green);
            box-shadow: 0 0 6px var(--tactical-green-glow);
            animation: hudBlink 1.5s ease-in-out infinite;
        }
        @keyframes hudBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Canvas with scanlines */
        .canvas-wrapper {
            position: relative;
            line-height: 0;
        }

        canvas {
            display: block;
            border: 3px solid #1a2010;
            background: #000;
        }

        /* Scanline overlay */
        .canvas-wrapper::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 2;
        }

        /* --- Config panel --- */
        #config-panel {
            width: 290px;
            padding: 24px 22px;
            background: var(--bg-panel);
            border: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            animation: panelSlide 0.8s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes panelSlide {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* Tactical corners on panel */
        #config-panel::before,
        #config-panel::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: var(--amber);
            border-style: solid;
            z-index: 3;
            pointer-events: none;
        }
        #config-panel::before {
            top: 8px;
            right: 8px;
            border-width: 2px 2px 0 0;
        }
        #config-panel::after {
            bottom: 8px;
            left: 8px;
            border-width: 0 0 2px 2px;
        }

        /* Panel title */
        #config-panel .panel-title {
            font-family: 'Black Ops One', cursive;
            font-size: 22px;
            color: var(--amber);
            letter-spacing: 3px;
            text-align: center;
            text-transform: uppercase;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-accent);
            position: relative;
        }

        #config-panel .panel-title::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: var(--amber);
            box-shadow: 0 0 10px var(--amber-glow);
        }

        /* Config group */
        .config-group {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 14px;
            position: relative;
        }

        .config-group::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-accent), transparent);
            opacity: 0.5;
        }

        .config-group label {
            display: block;
            font-family: 'Share Tech Mono', monospace;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .config-group label::before {
            content: '▶ ';
            color: var(--amber);
            font-size: 9px;
        }

        .config-group .hint {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 5px;
            letter-spacing: 0.5px;
        }

        /* NPC count control */
        .count-control {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .count-control button {
            width: 38px;
            height: 38px;
            border: 1px solid var(--border-accent);
            background: var(--bg-panel);
            color: var(--text-primary);
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            letter-spacing: 0;
        }

        .count-control button:hover {
            background: var(--olive);
            border-color: var(--amber);
            color: var(--amber-glow);
            box-shadow: 0 0 12px rgba(212, 160, 23, 0.2);
        }
        .count-control button:active {
            background: var(--amber);
            color: #000;
            transition: none;
        }

        .count-control button:first-child { border-radius: 3px 0 0 3px; }
        .count-control button:last-child { border-radius: 0 3px 3px 0; }

        .count-control input {
            width: 64px;
            height: 38px;
            text-align: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 20px;
            font-weight: bold;
            background: #0a0f06;
            border: 1px solid var(--border-accent);
            border-left: none;
            border-right: none;
            color: var(--amber);
            -moz-appearance: textfield;
        }
        .count-control input::-webkit-outer-spin-button,
        .count-control input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Difficulty buttons */
        .difficulty-btns {
            display: flex;
            gap: 0;
        }

        .difficulty-btns button {
            flex: 1;
            padding: 9px 0;
            border: 1px solid var(--border);
            background: var(--bg-panel);
            color: var(--text-dim);
            font-family: 'Share Tech Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
        }

        .difficulty-btns button:first-child { border-radius: 3px 0 0 3px; }
        .difficulty-btns button:last-child { border-radius: 0 3px 3px 0; }

        .difficulty-btns button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%) scaleX(0);
            width: 70%;
            height: 2px;
            background: var(--amber);
            transition: transform 0.25s;
        }

        .difficulty-btns button:hover {
            color: var(--text-primary);
            background: var(--bg-card);
            border-color: var(--border-accent);
        }

        .difficulty-btns button.active {
            border-color: var(--amber);
            background: rgba(212, 160, 23, 0.08);
            color: var(--amber);
            box-shadow: inset 0 0 15px rgba(212, 160, 23, 0.06);
        }

        .difficulty-btns button.active::after {
            transform: translateX(-50%) scaleX(1);
        }

        /* Start button */
        #btn-start {
            margin-top: 6px;
            padding: 14px;
            font-family: 'Black Ops One', cursive;
            font-size: 18px;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: transparent;
            color: var(--amber);
            border: 2px solid var(--amber);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        #btn-start::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--amber);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 0;
        }

        #btn-start:hover::before {
            transform: scaleX(1);
        }

        #btn-start:hover {
            color: #0b1007;
            box-shadow: 0 0 30px rgba(212, 160, 23, 0.3), inset 0 0 30px rgba(212, 160, 23, 0.1);
        }

        #btn-start:active { transform: scale(0.97); }

        #btn-start span {
            position: relative;
            z-index: 1;
        }

        #btn-start:disabled {
            border-color: var(--border);
            color: var(--text-dim);
            cursor: not-allowed;
        }
        #btn-start:disabled::before { display: none; }
        #btn-start:disabled:hover {
            box-shadow: none;
            color: var(--text-dim);
        }

        /* Stats display */
        #game-stats {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 14px;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        #game-stats .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(42, 51, 32, 0.5);
        }
        #game-stats .stat-row:last-child { border-bottom: none; }

        #game-stats .stat-label {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 1px;
        }
        #game-stats .stat-val {
            color: var(--amber);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 6px rgba(212, 160, 23, 0.3);
        }

        /* Controls help */
        #controls-help {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            line-height: 2;
            letter-spacing: 0.5px;
            margin-top: auto;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        #controls-help .key {
            display: inline-block;
            padding: 2px 7px;
            background: var(--bg-card);
            border: 1px solid var(--border-accent);
            font-family: 'Share Tech Mono', monospace;
            color: var(--text-primary);
            font-size: 10px;
            margin: 0 2px;
        }

        /* --- Responsive --- */
        @media (max-width: 1320px) {
            #container { flex-direction: column; align-items: center; }
            #config-panel {
                width: 100%;
                max-width: 960px;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 12px;
                padding: 16px;
                border-left: 2px solid var(--border);
                border-top: none;
            }
            #config-panel .panel-title { width: 100%; }
            #config-panel > *:not(.panel-title) { flex: 1; min-width: 140px; }
            #game-area { border-right: 2px solid var(--border); }
        }
    </style>
</head>
<body>
    <div class="noise"></div>

    <div id="container">
        <!-- Game Area -->
        <div id="game-area">
            <!-- HUD -->
            <div id="hud">
                <div class="hud-item">
                    <span class="hud-dot"></span>
                    <span class="hud-label">SYS</span>
                    <span style="color:var(--tactical-green);font-size:11px;">ACTIVE</span>
                </div>
                <div class="hud-sep"></div>
                <div class="hud-item">
                    <span class="hud-label">HP</span>
                    <span class="hud-value hud-hp" id="hp">10</span>
                </div>
                <div class="hud-sep"></div>
                <div class="hud-item">
                    <span class="hud-label">HOSTILES</span>
                    <span class="hud-value hud-enemies" id="enemies">10</span>
                </div>
                <div class="hud-sep"></div>
                <div class="hud-item">
                    <span class="hud-label">CLASS</span>
                    <span class="hud-value hud-diff" id="player-diff-display">初级</span>
                </div>
            </div>

            <!-- Canvas -->
            <div class="canvas-wrapper">
                <canvas id="gameCanvas" width="960" height="640"></canvas>
            </div>
        </div>

        <!-- Config Panel -->
        <div id="config-panel">
            <div class="panel-title">⚙ Mission Config</div>

            <div class="config-group">
                <label>Hostile Units</label>
                <div class="count-control">
                    <button id="btn-npc-minus">−</button>
                    <input type="number" id="npc-count" value="10" min="1" max="30">
                    <button id="btn-npc-plus">+</button>
                </div>
                <div class="hint">RANGE: 1 – 30 UNITS</div>
            </div>

            <div class="config-group">
                <label>Hostile Threat Level</label>
                <div class="difficulty-btns" id="npc-difficulty-group">
                    <button data-level="beginner" class="active">初级</button>
                    <button data-level="intermediate">中级</button>
                    <button data-level="advanced">高级</button>
                </div>
                <div class="hint">FIRERATE: 5s / 3s / 1s</div>
            </div>

            <div class="config-group">
                <label>Weapon System</label>
                <div class="difficulty-btns" id="player-difficulty-group">
                    <button data-level="beginner" class="active">初级</button>
                    <button data-level="intermediate">中级</button>
                    <button data-level="advanced">高级</button>
                </div>
                <div class="hint">VOLLEY: 1× / 3× / 5× ROUNDS</div>
            </div>

            <button id="btn-start"><span>▶ Engage</span></button>

            <div id="game-stats">
                <div class="stat-row">
                    <span class="stat-label">Armor</span>
                    <span class="stat-val">10 HP</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Hostile Armor</span>
                    <span class="stat-val">10 HP</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Fortification</span>
                    <span class="stat-val">3 HP</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Hostile Count</span>
                    <span class="stat-val" id="stat-npc-count">10</span>
                </div>
            </div>

            <div id="controls-help">
                <span class="key">↑↓←→</span><span class="key">WASD</span> Move<br>
                <span class="key">SPACE</span> Fire &nbsp;
                <span class="key">ENTER</span> Start &nbsp;
                <span class="key">R</span> Restart
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpEl = document.getElementById('hp');
const enemiesEl = document.getElementById('enemies');
const playerDiffDisplay = document.getElementById('player-diff-display');

// --- DOM elements ---
const npcCountInput = document.getElementById('npc-count');
const btnNpcMinus = document.getElementById('btn-npc-minus');
const btnNpcPlus = document.getElementById('btn-npc-plus');
const btnStart = document.getElementById('btn-start');
const statNpcCount = document.getElementById('stat-npc-count');

// --- Config state ---
let config = {
    npcCount: 10,
    npcDifficulty: 'beginner',
    playerDifficulty: 'beginner'
};

const NPC_COOLDOWNS = { beginner: 300, intermediate: 180, advanced: 60 };
const PLAYER_BULLETS = { beginner: 1, intermediate: 3, advanced: 5 };
const DIFF_LABELS = { beginner: '初级', intermediate: '中级', advanced: '高级' };

// --- Config panel handlers ---
btnNpcMinus.addEventListener('click', () => {
    let v = parseInt(npcCountInput.value) || 10;
    v = Math.max(1, v - 1);
    npcCountInput.value = v;
    config.npcCount = v;
    statNpcCount.textContent = v;
});
btnNpcPlus.addEventListener('click', () => {
    let v = parseInt(npcCountInput.value) || 10;
    v = Math.min(30, v + 1);
    npcCountInput.value = v;
    config.npcCount = v;
    statNpcCount.textContent = v;
});
npcCountInput.addEventListener('change', () => {
    let v = parseInt(npcCountInput.value) || 10;
    v = Math.max(1, Math.min(30, v));
    npcCountInput.value = v;
    config.npcCount = v;
    statNpcCount.textContent = v;
});

document.querySelectorAll('#npc-difficulty-group button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#npc-difficulty-group button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        config.npcDifficulty = btn.dataset.level;
    });
});
document.querySelectorAll('#player-difficulty-group button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('#player-difficulty-group button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        config.playerDifficulty = btn.dataset.level;
        playerDiffDisplay.textContent = DIFF_LABELS[config.playerDifficulty];
    });
});
btnStart.addEventListener('click', () => { game.start(); });

// --- Game constants ---
const TILE_SIZE = 40;
const COLS = canvas.width / TILE_SIZE;
const ROWS = canvas.height / TILE_SIZE;

// --- Utility ---
function rectIntersect(r1, r2) {
    return r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y;
}
function dirToAngle(dir) {
    switch (dir) {
        case 'UP': return -Math.PI / 2;
        case 'DOWN': return Math.PI / 2;
        case 'LEFT': return Math.PI;
        case 'RIGHT': return 0;
        default: return 0;
    }
}

// --- Behavior Tree ---
class Node { run(tick) {} }
class Sequence extends Node {
    constructor(children) { super(); this.children = children; }
    run(tick) {
        for (let child of this.children) {
            if (child.run(tick) !== 'SUCCESS') return 'FAILURE';
        }
        return 'SUCCESS';
    }
}
class Selector extends Node {
    constructor(children) { super(); this.children = children; }
    run(tick) {
        for (let child of this.children) {
            if (child.run(tick) !== 'FAILURE') return 'SUCCESS';
        }
        return 'FAILURE';
    }
}
class CanSeePlayer extends Node {
    run(tick) {
        let npc = tick.blackboard.npc;
        let player = tick.blackboard.game.player;
        if (!player) return 'FAILURE';
        let dist = Math.hypot(npc.x - player.x, npc.y - player.y);
        if (dist < 400 && (Math.abs(npc.x - player.x) < 24 || Math.abs(npc.y - player.y) < 24)) {
            return 'SUCCESS';
        }
        return 'FAILURE';
    }
}
class AttackPlayer extends Node {
    run(tick) {
        let npc = tick.blackboard.npc;
        let player = tick.blackboard.game.player;
        if (Math.abs(npc.x - player.x) > Math.abs(npc.y - player.y)) {
            npc.dir = player.x > npc.x ? 'RIGHT' : 'LEFT';
        } else {
            npc.dir = player.y > npc.y ? 'DOWN' : 'UP';
        }
        npc.shoot();
        return 'SUCCESS';
    }
}
class Patrol extends Node {
    run(tick) {
        let npc = tick.blackboard.npc;
        let game = tick.blackboard.game;
        if (npc.isBlocked || Math.random() < 0.025) {
            const dirs = ['UP', 'DOWN', 'LEFT', 'RIGHT'];
            npc.dir = dirs[Math.floor(Math.random() * dirs.length)];
        }
        npc.move(game);
        return 'SUCCESS';
    }
}

// --- Bullet class ---
let bulletGroupCounter = 0;
class Bullet {
    constructor(x, y, angle, speed, isNPC, groupId) {
        this.w = 6;
        this.h = 6;
        this.x = x - this.w / 2;
        this.y = y - this.h / 2;
        this.angle = angle;
        this.speed = speed;
        this.dx = Math.cos(angle) * speed;
        this.dy = Math.sin(angle) * speed;
        this.isNPC = isNPC;
        this.groupId = groupId;
        this.alive = true;
    }
    update(game) {
        this.x += this.dx;
        this.y += this.dy;
        if (this.x < -10 || this.x > canvas.width + 10 || this.y < -10 || this.y > canvas.height + 10) {
            this.alive = false;
            return;
        }
        for (let wall of game.walls) {
            if (rectIntersect(this, wall)) {
                wall.hp--;
                this.alive = false;
                return;
            }
        }
    }
    draw() {
        ctx.fillStyle = this.isNPC ? '#ff5544' : '#f0c040';
        ctx.shadowColor = this.isNPC ? '#ff5544' : '#f0c040';
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(this.x + this.w / 2, this.y + this.h / 2, this.w / 2 + 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

// --- Tank class ---
class Tank {
    constructor(x, y, color, isNPC, npcCooldown) {
        this.x = x;
        this.y = y;
        this.w = 34;
        this.h = 34;
        this.color = color;
        this.isNPC = isNPC;
        this.dir = 'UP';
        this.speed = 2;
        this.hp = 10;
        this.cooldown = 0;
        this.npcCooldownMax = npcCooldown || 300;
        this.isBlocked = false;

        if (isNPC) {
            this.bt = new Selector([
                new Sequence([new CanSeePlayer(), new AttackPlayer()]),
                new Patrol()
            ]);
            this.blackboard = { npc: this };
        }
    }

    move(game) {
        let nextX = this.x;
        let nextY = this.y;
        if (this.dir === 'UP') nextY -= this.speed;
        if (this.dir === 'DOWN') nextY += this.speed;
        if (this.dir === 'LEFT') nextX -= this.speed;
        if (this.dir === 'RIGHT') nextX += this.speed;

        let dummy = { x: nextX, y: nextY, w: this.w, h: this.h };
        this.isBlocked = false;

        if (nextX < 0 || nextX + this.w > canvas.width || nextY < 0 || nextY + this.h > canvas.height) {
            this.isBlocked = true;
        }
        for (let wall of game.walls) {
            if (rectIntersect(dummy, wall)) this.isBlocked = true;
        }
        let allTanks = [game.player, ...game.npcs];
        for (let other of allTanks) {
            if (!other || other === this) continue;
            if (rectIntersect(dummy, other)) this.isBlocked = true;
        }

        if (!this.isBlocked) {
            this.x = nextX;
            this.y = nextY;
        }
    }

    shoot(bulletCount, groupId) {
        if (this.cooldown > 0) return;

        let cx = this.x + this.w / 2;
        let cy = this.y + this.h / 2;
        let baseAngle = dirToAngle(this.dir);
        let count = bulletCount || 1;

        // 直线队列模式
        let gapX = -Math.cos(baseAngle) * 14;
        let gapY = -Math.sin(baseAngle) * 14;

        for (let i = 0; i < count; i++) {
            let bx = cx + gapX * i;
            let by = cy + gapY * i;
            game.bullets.push(new Bullet(bx, by, baseAngle, 5, this.isNPC, groupId));
        }

        if (this.isNPC) {
            this.cooldown = this.npcCooldownMax;
        } else {
            if (count === 1) this.cooldown = 0;
            else if (count === 3) this.cooldown = 10;
            else this.cooldown = 15;
        }
    }

    update(game) {
        if (this.cooldown > 0) this.cooldown--;
        if (this.isNPC) {
            this.blackboard.game = game;
            this.bt.run({ blackboard: this.blackboard });
        }
    }

    draw() {
        // Tank body
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.isNPC ? '#2ecc40' : '#cc3a2f';
        ctx.shadowBlur = this.isNPC ? 4 : 6;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        ctx.shadowBlur = 0;

        // Tank border
        ctx.strokeStyle = this.isNPC ? '#1a5c1a' : '#5a1a1a';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.w, this.h);

        // HP bar
        let hpPercent = this.hp / 10;
        let barW = this.w;
        let barH = 4;
        let barX = this.x;
        let barY = this.y - 8;

        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(barX, barY, barW, barH);

        let barColor;
        if (hpPercent > 0.6) barColor = '#2ecc40';
        else if (hpPercent > 0.3) barColor = '#d4a017';
        else barColor = '#cc3a2f';

        ctx.fillStyle = barColor;
        ctx.shadowColor = barColor;
        ctx.shadowBlur = 3;
        ctx.fillRect(barX, barY, barW * hpPercent, barH);
        ctx.shadowBlur = 0;

        // Cannon
        ctx.fillStyle = '#c8ccbe';
        let cx = this.x + this.w / 2;
        let cy = this.y + this.h / 2;
        if (this.dir === 'UP') {
            ctx.fillRect(cx - 3, this.y - 10, 6, 10);
        } else if (this.dir === 'DOWN') {
            ctx.fillRect(cx - 3, this.y + this.h, 6, 10);
        } else if (this.dir === 'LEFT') {
            ctx.fillRect(this.x - 10, cy - 3, 10, 6);
        } else if (this.dir === 'RIGHT') {
            ctx.fillRect(this.x + this.w, cy - 3, 10, 6);
        }

        // Treads
        ctx.fillStyle = this.isNPC ? '#1a3a1a' : '#3a1010';
        if (this.dir === 'UP' || this.dir === 'DOWN') {
            ctx.fillRect(this.x - 4, this.y, 4, this.h);
            ctx.fillRect(this.x + this.w, this.y, 4, this.h);
        } else {
            ctx.fillRect(this.x, this.y - 4, this.w, 4);
            ctx.fillRect(this.x, this.y + this.h, this.w, 4);
        }
    }
}

// --- Game controller ---
class Game {
    constructor() {
        this.state = 'MENU';
        this.keys = {};
        this.player = null;
        this.npcs = [];
        this.bullets = [];
        this.walls = [];
        this.initInput();
    }

    initInput() {
        window.addEventListener('keydown', e => {
            this.keys[e.key] = true;
            if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => { this.keys[e.key] = false; });
    }

    start() {
        let npcCooldown = NPC_COOLDOWNS[config.npcDifficulty];
        this.player = new Tank(40, 40, '#cc3a2f', false, npcCooldown);
        this.player.hp = 10;
        this.npcs = [];
        this.bullets = [];
        this.walls = [];
        this.generateMap();

        let npcCount = config.npcCount;
        let attempts = 0;
        let maxAttempts = npcCount * 120;
        while (this.npcs.length < npcCount && attempts < maxAttempts) {
            attempts++;
            let rx = Math.floor(Math.random() * (COLS - 2) + 1) * TILE_SIZE + 3;
            let ry = Math.floor(Math.random() * (ROWS - 2) + 1) * TILE_SIZE + 3;
            let dummy = { x: rx, y: ry, w: 34, h: 34 };
            let distToPlayer = Math.hypot(rx - this.player.x, ry - this.player.y);
            let blockedByWall = this.walls.some(w => rectIntersect(dummy, w));
            let blockedByPlayer = rectIntersect(dummy, this.player);
            let blockedByNpc = this.npcs.some(n => rectIntersect(dummy, n));
            let tooClose = distToPlayer < 80;
            if (!blockedByWall && !blockedByPlayer && !blockedByNpc && !tooClose) {
                let npc = new Tank(rx, ry, '#2ecc40', true, npcCooldown);
                npc.hp = 10;
                this.npcs.push(npc);
            }
        }

        this.state = 'PLAYING';
        btnStart.disabled = true;
        playerDiffDisplay.textContent = DIFF_LABELS[config.playerDifficulty];
        hpEl.textContent = this.player.hp;
        enemiesEl.textContent = this.npcs.length;
    }

    generateMap() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (r < 2 && c < 4) continue;
                if (Math.random() < 0.20) {
                    this.walls.push({
                        x: c * TILE_SIZE, y: r * TILE_SIZE,
                        w: TILE_SIZE, h: TILE_SIZE, hp: 3
                    });
                }
            }
        }
    }

    update() {
        if (this.state === 'MENU') {
            if (this.keys['Enter']) this.start();
            return;
        }
        if (this.state === 'GAMEOVER' || this.state === 'WIN') {
            if (this.keys['r'] || this.keys['R']) {
                btnStart.disabled = false;
                this.start();
            }
            return;
        }

        // Player movement
        if (this.keys['ArrowUp'] || this.keys['w']) { this.player.dir = 'UP'; this.player.move(this); }
        else if (this.keys['ArrowDown'] || this.keys['s']) { this.player.dir = 'DOWN'; this.player.move(this); }
        else if (this.keys['ArrowLeft'] || this.keys['a']) { this.player.dir = 'LEFT'; this.player.move(this); }
        else if (this.keys['ArrowRight'] || this.keys['d']) { this.player.dir = 'RIGHT'; this.player.move(this); }

        // Player shooting
        if (this.keys[' ']) {
            let bulletCount = PLAYER_BULLETS[config.playerDifficulty];
            let groupId = 'p_' + bulletGroupCounter++;
            this.player.shoot(bulletCount, groupId);
        }

        this.player.update(this);
        for (let npc of this.npcs) npc.update(this);
        for (let b of this.bullets) b.update(this);

        // Bullet-tank collision
        for (let b of this.bullets) {
            if (!b.alive) continue;
            if (b.isNPC) {
                if (rectIntersect(b, this.player)) {
                    this.player.hp--;
                    b.alive = false;
                    if (this.player.hp <= 0) {
                        this.state = 'GAMEOVER';
                        btnStart.disabled = false;
                    }
                }
            } else {
                for (let npc of this.npcs) {
                    if (rectIntersect(b, npc)) {
                        npc.hp--;
                        b.alive = false;
                        break;
                    }
                }
            }
        }

        this.bullets = this.bullets.filter(b => b.alive);
        this.walls = this.walls.filter(w => w.hp > 0);
        this.npcs = this.npcs.filter(npc => npc.hp > 0);

        if (this.npcs.length === 0) {
            this.state = 'WIN';
            btnStart.disabled = false;
        }

        hpEl.textContent = this.player.hp;
        enemiesEl.textContent = this.npcs.length;
    }

    drawBulletConnections() {
        let groups = {};
        for (let b of this.bullets) {
            if (!b.alive || !b.groupId) continue;
            if (!groups[b.groupId]) groups[b.groupId] = [];
            groups[b.groupId].push(b);
        }
        for (let [, bullets] of Object.entries(groups)) {
            if (bullets.length < 2) continue;
            bullets.sort((a, b) => {
                let projA = a.x * Math.cos(a.angle) + a.y * Math.sin(a.angle);
                let projB = b.x * Math.cos(b.angle) + b.y * Math.sin(b.angle);
                return projA - projB;
            });
            ctx.strokeStyle = 'rgba(240,192,64,0.25)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3, 5]);
            ctx.beginPath();
            ctx.moveTo(bullets[0].x + bullets[0].w / 2, bullets[0].y + bullets[0].h / 2);
            for (let i = 1; i < bullets.length; i++) {
                ctx.lineTo(bullets[i].x + bullets[i].w / 2, bullets[i].y + bullets[i].h / 2);
            }
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (this.state === 'MENU') {
            ctx.fillStyle = '#c8ccbe';
            ctx.font = 'bold 36px "Black Ops One", cursive';
            ctx.textAlign = 'center';
            ctx.fillText('TANK COMMAND', canvas.width / 2, canvas.height / 2 - 40);

            ctx.fillStyle = '#d4a017';
            ctx.font = '18px "Share Tech Mono", monospace';
            ctx.fillText('// 坦克大战', canvas.width / 2, canvas.height / 2);

            ctx.fillStyle = '#6b7260';
            ctx.font = '14px "Share Tech Mono", monospace';
            ctx.fillText('PRESS [ ENTER ] OR CLICK [ ENGAGE ]', canvas.width / 2, canvas.height / 2 + 50);

            // Decorative targeting reticle
            ctx.strokeStyle = 'rgba(212,160,23,0.15)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2 - 20, 80, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2 - 100, canvas.height / 2 - 20);
            ctx.lineTo(canvas.width / 2 - 70, canvas.height / 2 - 20);
            ctx.moveTo(canvas.width / 2 + 70, canvas.height / 2 - 20);
            ctx.lineTo(canvas.width / 2 + 100, canvas.height / 2 - 20);
            ctx.moveTo(canvas.width / 2, canvas.height / 2 - 120);
            ctx.lineTo(canvas.width / 2, canvas.height / 2 - 90);
            ctx.moveTo(canvas.width / 2, canvas.height / 2 + 50);
            ctx.lineTo(canvas.width / 2, canvas.height / 2 + 80);
            ctx.stroke();

            ctx.textAlign = 'start';
            return;
        }

        if (this.state === 'GAMEOVER') {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#cc3a2f';
            ctx.font = 'bold 52px "Black Ops One", cursive';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#cc3a2f';
            ctx.shadowBlur = 30;
            ctx.fillText('MISSION FAILED', canvas.width / 2, canvas.height / 2 - 10);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#c8ccbe';
            ctx.font = '16px "Share Tech Mono", monospace';
            ctx.fillText('PRESS [ R ] TO RETRY', canvas.width / 2, canvas.height / 2 + 50);
            ctx.textAlign = 'start';
            return;
        }

        if (this.state === 'WIN') {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#d4a017';
            ctx.font = 'bold 52px "Black Ops One", cursive';
            ctx.textAlign = 'center';
            ctx.shadowColor = '#d4a017';
            ctx.shadowBlur = 30;
            ctx.fillText('MISSION COMPLETE', canvas.width / 2, canvas.height / 2 - 10);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#c8ccbe';
            ctx.font = '16px "Share Tech Mono", monospace';
            ctx.fillText('PRESS [ R ] TO REPLAY', canvas.width / 2, canvas.height / 2 + 50);
            ctx.textAlign = 'start';
            return;
        }

        // --- PLAYING ---
        // Grid
        ctx.strokeStyle = '#0d1608';
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= canvas.width; x += TILE_SIZE) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += TILE_SIZE) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        // Walls
        for (let w of this.walls) {
            if (w.hp === 3) ctx.fillStyle = '#3a4f28';
            else if (w.hp === 2) ctx.fillStyle = '#5a7540';
            else ctx.fillStyle = '#8a9a60';

            ctx.fillRect(w.x + 2, w.y + 2, w.w - 4, w.h - 4);
            ctx.strokeStyle = '#1a2510';
            ctx.lineWidth = 2;
            ctx.strokeRect(w.x, w.y, w.w, w.h);

            // HP dots
            ctx.fillStyle = '#d4a017';
            for (let i = 0; i < w.hp; i++) {
                ctx.beginPath();
                ctx.arc(w.x + 8 + i * 10, w.y + 10, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        this.drawBulletConnections();

        // Tanks
        this.player.draw();
        for (let npc of this.npcs) npc.draw();

        // Bullets
        for (let b of this.bullets) b.draw();
    }
}

// --- Game loop ---
const game = new Game();
function loop() {
    game.update();
    game.draw();
    requestAnimationFrame(loop);
}
loop();
</script>
