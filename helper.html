
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
</head>
<body style="margin:0;padding:0;background:#000;">
<iframe id="game" src="tank.html" style="border:none;width:1280px;height:800px;"></iframe>
<script>
const game = document.getElementById('game');
game.onload = () => {
  setTimeout(() => {
    const doc = game.contentDocument;
    const canvas = doc.querySelector('canvas');
    if (!canvas) { console.log('NO CANVAS'); return; }
    const rect = canvas.getBoundingClientRect();
    const w = Math.round(canvas.width || rect.width);
    const h = Math.round(canvas.height || rect.height);
    console.log('CANVAS_SIZE:' + w + 'x' + h);
    console.log('CANVAS_POS:' + Math.round(rect.x) + ',' + Math.round(rect.y));
  }, 2000);
};
</script>
</body>
</html>
