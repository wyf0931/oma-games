<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 — 经典数字合并</title>
    <link rel="stylesheet" href="../shared/oma-games.css">
    <style>
        /* ===== 2048 暖色调色板（致敬 Gabriele Cirulli 2014 原版）===== */
        :root {
            /* 2048 经典暖色 — 默认亮主题 */
            --g-bg: #faf8ef;
            --g-bg-2: #f5f0e0;
            --g-grid-bg: #bbada0;
            --g-cell-bg: rgba(238, 228, 218, 0.35);
            --g-text-dark: #776e65;
            --g-text-light: #f9f6f2;
            --g-border: #bbada0;

            --g-score-bg: #bbada0;
            --g-score-label: #eee4da;
            --g-score-value: #ffffff;

            --g-btn-bg: #8f7a66;
            --g-btn-fg: #f9f6f2;
            --g-btn-hover: #9f8b77;

            --g-overlay-bg: rgba(238, 228, 218, 0.73);
            --g-overlay-text: #776e65;

            /* tile 颜色（亮） */
            --t-2:    #eee4da;
            --t-4:    #ede0c8;
            --t-8:    #f2b179;
            --t-16:   #f59563;
            --t-32:   #f67c5f;
            --t-64:   #f65e3b;
            --t-128:  #edcf72;
            --t-256:  #edcc61;
            --t-512:  #edc850;
            --t-1024: #edc53f;
            --t-2048: #edc22e;
            --t-big:  #3c3a32;

            --tile-size: 92px;
            --grid-gap: 12px;
            --grid-padding: 12px;

            /* 覆盖共享顶栏 */
            --oma-header-bg: rgba(250, 248, 239, 0.85);
            --oma-header-fg: #776e65;
            --oma-header-hover-bg: #8f7a66;
            --oma-header-hover-fg: #faf8ef;
            --oma-header-border: #bbada0;
            --oma-header-glow: transparent;
        }

        [data-theme='dark'] {
            --g-bg: #1a1612;
            --g-bg-2: #221c16;
            --g-grid-bg: #3a322a;
            --g-cell-bg: rgba(74, 64, 54, 0.55);
            --g-text-dark: #f9f6f2;
            --g-text-light: #faf8ef;
            --g-border: #5a4f44;

            --g-score-bg: #3a322a;
            --g-score-label: #aa9d8a;
            --g-score-value: #ffffff;

            --g-btn-bg: #bbada0;
            --g-btn-fg: #1a1612;
            --g-btn-hover: #cabea9;

            --g-overlay-bg: rgba(26, 22, 18, 0.78);
            --g-overlay-text: #edc22e;

            /* tile 颜色（暗，略调暗） */
            --t-2:    #3a322a;
            --t-4:    #4a3f33;
            --t-8:    #d49560;
            --t-16:   #d68345;
            --t-32:   #d66748;
            --t-64:   #d44c2e;
            --t-128:  #d4b041;
            --t-256:  #d4ad2e;
            --t-512:  #d4ab1c;
            --t-1024: #d4a70b;
            --t-2048: #d4a200;
            --t-big:  #2a2620;

            --oma-header-bg: rgba(26, 22, 18, 0.85);
            --oma-header-fg: #f9f6f2;
            --oma-header-hover-bg: #bbada0;
            --oma-header-hover-fg: #1a1612;
            --oma-header-border: #5a4f44;
        }

        /* 共享 reset 中 body 默认颜色不适用于 2048 暖色，覆盖之 */
        html, body {
            background: var(--g-bg);
            color: var(--g-text-dark);
            font-family: 'Clear Sans', 'Helvetica Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            transition: background-color 0.25s ease, color 0.25s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 72px 16px 32px;
            position: relative;
        }

        main {
            width: 100%;
            max-width: 560px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            position: relative;
            z-index: 1;
        }

        /* ===== 顶栏：标题 + 分数 ===== */
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .info-bar h1 {
            font-size: 56px;
            font-weight: 800;
            color: var(--g-text-dark);
            letter-spacing: -1px;
            line-height: 1;
        }

        .scores {
            display: flex;
            gap: 8px;
        }

        .score-box {
            background: var(--g-score-bg);
            border-radius: 6px;
            padding: 8px 18px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 86px;
            line-height: 1.1;
        }

        .score-box .label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--g-score-label);
        }

        .score-box .value {
            font-size: 24px;
            font-weight: 800;
            color: var(--g-score-value);
            margin-top: 2px;
        }

        .score-box .value.bump {
            animation: scoreBump 0.32s ease;
        }
        @keyframes scoreBump {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.18); color: #edc22e; }
            100% { transform: scale(1); }
        }

        /* ===== 控制栏 ===== */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .ctrl-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .label-text {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--g-text-dark);
            opacity: 0.7;
        }

        .size-group {
            display: flex;
            background: var(--g-grid-bg);
            border-radius: 6px;
            padding: 3px;
            gap: 2px;
        }

        .size-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: var(--g-score-label);
            font-weight: 700;
            font-size: 13px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            font-family: inherit;
        }

        .size-btn:hover {
            color: var(--g-text-light);
        }

        .size-btn.active {
            background: var(--g-btn-bg);
            color: var(--g-btn-fg);
        }

        .btn-new {
            padding: 9px 20px;
            background: var(--g-btn-bg);
            color: var(--g-btn-fg);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
            font-family: inherit;
        }

        .btn-new:hover {
            background: var(--g-btn-hover);
        }

        .btn-new:active {
            transform: scale(0.97);
        }

        .ctrl-right {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--g-text-dark);
            opacity: 0.6;
            font-size: 12px;
        }

        .oma-key {
            background: var(--g-bg-2);
            border-color: var(--g-border);
            color: var(--g-text-dark);
        }

        /* ===== 棋盘 ===== */
        .grid-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .grid {
            position: relative;
            background: var(--g-grid-bg);
            border-radius: 8px;
            padding: var(--grid-padding);
            display: grid;
            gap: var(--grid-gap);
            box-shadow: 0 12px 32px rgba(119, 110, 101, 0.18);
            touch-action: none;
        }

        .grid.shake {
            animation: shake 0.32s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(3px); }
        }

        .cell {
            background: var(--g-cell-bg);
            border-radius: 4px;
        }

        /* tile 层（覆盖在 cells 上方）*/
        .tile-layer {
            position: absolute;
            top: var(--grid-padding);
            left: var(--grid-padding);
            right: var(--grid-padding);
            bottom: var(--grid-padding);
            pointer-events: none;
        }

        .tile {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: 800;
            color: var(--g-text-dark);
            background: var(--t-2);
            transition:
                transform 0.14s ease-in-out,
                background-color 0.14s ease,
                color 0.14s ease;
            will-change: transform;
            user-select: none;
            line-height: 1;
        }

        /* 不同数字的颜色 / 字号 */
        .tile[data-v="2"]    { background: var(--t-2);    color: var(--g-text-dark); }
        .tile[data-v="4"]    { background: var(--t-4);    color: var(--g-text-dark); }
        .tile[data-v="8"]    { background: var(--t-8);    color: var(--g-text-light); }
        .tile[data-v="16"]   { background: var(--t-16);   color: var(--g-text-light); }
        .tile[data-v="32"]   { background: var(--t-32);   color: var(--g-text-light); }
        .tile[data-v="64"]   { background: var(--t-64);   color: var(--g-text-light); }
        .tile[data-v="128"]  { background: var(--t-128);  color: var(--g-text-light); box-shadow: 0 0 18px rgba(237, 207, 114, 0.45); }
        .tile[data-v="256"]  { background: var(--t-256);  color: var(--g-text-light); box-shadow: 0 0 20px rgba(237, 204, 97, 0.5); }
        .tile[data-v="512"]  { background: var(--t-512);  color: var(--g-text-light); box-shadow: 0 0 22px rgba(237, 200, 80, 0.55); }
        .tile[data-v="1024"] { background: var(--t-1024); color: var(--g-text-light); box-shadow: 0 0 24px rgba(237, 197, 63, 0.6); }
        .tile[data-v="2048"] { background: var(--t-2048); color: var(--g-text-light); box-shadow: 0 0 30px rgba(237, 194, 46, 0.75); }
        .tile[data-v="big"]  { background: var(--t-big);  color: var(--g-text-light); }

        /* tile 字号随棋盘大小调整 */
        .grid[data-size="4"] .tile { font-size: calc(var(--tile-size) * 0.42); }
        .grid[data-size="5"] .tile { font-size: calc(var(--tile-size) * 0.36); }
        .grid[data-size="6"] .tile { font-size: calc(var(--tile-size) * 0.30); }

        /* tile 动画 */
        .tile.new {
            animation: tilePop 0.18s ease;
        }
        @keyframes tilePop {
            0%   { transform: var(--pos) scale(0); }
            60%  { transform: var(--pos) scale(1.05); }
            100% { transform: var(--pos) scale(1); }
        }

        .tile.merged {
            animation: tileMerge 0.22s ease;
            z-index: 2;
        }
        @keyframes tileMerge {
            0%   { transform: var(--pos) scale(1); }
            45%  { transform: var(--pos) scale(1.18); }
            100% { transform: var(--pos) scale(1); }
        }

        /* ===== overlay 胜负 ===== */
        .overlay {
            position: absolute;
            inset: 0;
            background: var(--g-overlay-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-size: 48px;
            font-weight: 800;
            color: var(--g-overlay-text);
            letter-spacing: -1px;
            line-height: 1.1;
            text-align: center;
        }
        .overlay.win .overlay-title { color: #edc22e; }

        .overlay button {
            padding: 10px 24px;
            background: var(--g-btn-bg);
            color: var(--g-btn-fg);
            border: none;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.5px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .overlay button:hover { background: var(--g-btn-hover); }

        /* ===== 提示 ===== */
        .hint {
            text-align: center;
            font-size: 13px;
            color: var(--g-text-dark);
            opacity: 0.65;
            line-height: 1.6;
        }

        .hint b {
            color: var(--g-text-dark);
            opacity: 1;
        }

        /* ===== 响应式：小屏自适应 ===== */
        @media (max-width: 520px) {
            .info-bar h1 { font-size: 42px; }
            .score-box { padding: 6px 12px 4px; min-width: 68px; }
            .score-box .value { font-size: 18px; }
            .controls { font-size: 12px; }
            .ctrl-right { display: none; }
        }
    </style>
</head>
<body>
    <main>
        <div class="info-bar">
            <h1 data-i18n="title">2048</h1>
            <div class="scores">
                <div class="score-box">
                    <span class="label" data-i18n="score">SCORE</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="score-box">
                    <span class="label" data-i18n="best">BEST</span>
                    <span class="value" id="best">0</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <div class="ctrl-left">
                <span class="label-text" data-i18n="size">棋盘</span>
                <div class="size-group" id="size-group">
                    <button class="size-btn active" data-size="4">4×4</button>
                    <button class="size-btn" data-size="5">5×5</button>
                    <button class="size-btn" data-size="6">6×6</button>
                </div>
                <button class="btn-new" id="btn-new" data-i18n="new_game">新游戏</button>
            </div>
            <div class="ctrl-right">
                <span class="oma-key">←</span>
                <span class="oma-key">↑</span>
                <span class="oma-key">↓</span>
                <span class="oma-key">→</span>
                <span data-i18n="or_wasd">/ WASD</span>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="grid" data-size="4">
                <div class="tile-layer" id="tile-layer"></div>
                <div class="overlay" id="overlay">
                    <div class="overlay-title" id="overlay-title">GAME OVER</div>
                    <button id="overlay-btn" data-i18n="try_again">再来一局</button>
                </div>
            </div>
        </div>

        <div class="hint" data-i18n-html="hint">
            合并相同数字到 <b>2048</b> 获胜。键位：<b>←↑↓→</b> 或 <b>WASD</b>，触屏可滑动。
        </div>
    </main>

    <script src="../shared/oma-games.js"></script>
    <script>
        const { i18n, theme, input, fsm, clamp, randInt } = OmaGames;

        i18n.load({
            zh: {
                title: '2048',
                score: '分数',
                best: '最高',
                size: '棋盘',
                new_game: '新游戏',
                or_wasd: '/ WASD',
                hint: '合并相同数字到 <b>2048</b> 获胜。键位：<b>←↑↓→</b> 或 <b>WASD</b>，触屏可滑动。',
                try_again: '再来一局',
                keep_going: '继续',
                game_over: '游戏结束',
                you_win: '达成 2048！',
                you_win_sub: '可继续挑战更大数字'
            },
            en: {
                title: '2048',
                score: 'SCORE',
                best: 'BEST',
                size: 'GRID',
                new_game: 'New Game',
                or_wasd: '/ WASD',
                hint: 'Merge same numbers to reach <b>2048</b>. Keys: <b>←↑↓→</b> or <b>WASD</b>. Swipe on touch devices.',
                try_again: 'Try Again',
                keep_going: 'Keep Going',
                game_over: 'Game Over',
                you_win: 'You hit 2048!',
                you_win_sub: 'Keep going for bigger numbers'
            }
        });
        theme.init();
        // 监听方向键 preventDefault（2048 自身用 keydown 处理逻辑）
        input.init({ preventKeys: ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'] });
        OmaGames.ui.header();

        // ============================================================
        //  2048 游戏核心
        // ============================================================

        const gridEl       = document.getElementById('grid');
        const tileLayerEl  = document.getElementById('tile-layer');
        const overlayEl    = document.getElementById('overlay');
        const overlayTitle = document.getElementById('overlay-title');
        const overlayBtn   = document.getElementById('overlay-btn');
        const scoreEl      = document.getElementById('score');
        const bestEl       = document.getElementById('best');
        const sizeGroupEl  = document.getElementById('size-group');
        const btnNew       = document.getElementById('btn-new');

        // FSM: PLAYING → WIN（继续） / GAMEOVER
        const state = fsm({
            PLAYING:  { win: 'WIN', lose: 'GAMEOVER' },
            WIN:      { restart: 'PLAYING', keep: 'PLAYING' },
            GAMEOVER: { restart: 'PLAYING' }
        }, 'PLAYING');

        // 每个 size 对应的目标 tile 大小（与 CSS 变量 --tile-size 联动）
        const SIZE_PARAMS = {
            4: { tile: 92, gap: 12, pad: 12 },
            5: { tile: 78, gap: 10, pad: 12 },
            6: { tile: 64, gap: 8,  pad: 10 }
        };

        // 当前游戏数据
        let SIZE = 4;
        let board = [];          // SIZE × SIZE 的二维数组，元素为 0 或 { id, value }
        let nextTileId = 1;      // 每个 tile 的唯一 id（用于 DOM 复用 / 动画）
        let score = 0;
        let best  = parseInt(localStorage.getItem('oma_2048_best') || '0', 10);
        let bestBySize = JSON.parse(localStorage.getItem('oma_2048_best_by_size') || '{}');
        let hasWonOnce = false;  // 本局是否已弹过 WIN 横幅（避免重复弹）

        // ----- 棋盘尺寸 / CSS 变量 -----
        function applySizeVars() {
            const p = SIZE_PARAMS[SIZE];
            gridEl.style.setProperty('--tile-size', p.tile + 'px');
            gridEl.style.setProperty('--grid-gap',  p.gap  + 'px');
            gridEl.style.setProperty('--grid-padding', p.pad + 'px');
            gridEl.style.gridTemplateColumns = `repeat(${SIZE}, ${p.tile}px)`;
            gridEl.style.gridTemplateRows    = `repeat(${SIZE}, ${p.tile}px)`;
            gridEl.dataset.size = SIZE;
        }

        // ----- 新建空棋盘 -----
        function emptyBoard() {
            const b = [];
            for (let r = 0; r < SIZE; r++) {
                const row = [];
                for (let c = 0; c < SIZE; c++) row.push(0);
                b.push(row);
            }
            return b;
        }

        function cellSize() { return SIZE_PARAMS[SIZE].tile; }
        function cellGap()  { return SIZE_PARAMS[SIZE].gap;  }

        // ----- 随机生成新 tile（90% 为 2, 10% 为 4）-----
        function spawnTile() {
            const empties = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] === 0) empties.push([r, c]);
                }
            }
            if (empties.length === 0) return null;
            const [r, c] = empties[randInt(0, empties.length - 1)];
            const value = Math.random() < 0.9 ? 2 : 4;
            const tile = { id: nextTileId++, value, isNew: true };
            board[r][c] = tile;
            return tile;
        }

        // ============================================================
        //  滑动合并算法
        // ============================================================

        // 对一行向左滑动；返回 { row: 新数组, score: 本次得分, merged: 是否有合并发生 }
        // 输入/输出行的元素都是 0 或 { id, value } 对象。
        function slideLeft(row) {
            // 1. 压缩（去零），同时记录原始 cell 用于动画 id 追踪
            const f = row.filter(v => v !== 0);
            let scoreGain = 0;
            const result = [];
            const merges = []; // 记录被合并的 tile id（用于触发合并动画）

            // 2. 从左到右扫描相邻相同的对
            let i = 0;
            while (i < f.length) {
                if (i + 1 < f.length && f[i].value === f[i + 1].value) {
                    // 合并：保留左侧 id（视觉上左侧 tile 停下，右侧 tile 滑过来叠加上去）
                    const mergedTile = {
                        id: f[i].id,
                        value: f[i].value * 2,
                        mergedFrom: [f[i], f[i + 1]],
                        justMerged: true
                    };
                    result.push(mergedTile);
                    merges.push(mergedTile.id);
                    scoreGain += f[i].value * 2;
                    i += 2;
                } else {
                    result.push(f[i]);
                    i += 1;
                }
            }

            // 3. 补零到原长度
            while (result.length < row.length) result.push(0);

            return { row: result, score: scoreGain };
        }

        // 行操作工具
        function reverseRow(row) { return row.slice().reverse(); }
        function transpose(b) {
            const t = [];
            for (let c = 0; c < SIZE; c++) {
                const col = [];
                for (let r = 0; r < SIZE; r++) col.push(b[r][c]);
                t.push(col);
            }
            return t;
        }

        // 对整个棋盘沿某方向滑动：'left' | 'right' | 'up' | 'down'
        function move(direction) {
            // 把任意方向规约成"向左"：
            // left  : identity
            // right : 每行 reverse
            // up    : transpose
            // down  : transpose + 每行 reverse
            let work = board;

            if (direction === 'up' || direction === 'down') {
                work = transpose(work);
            }
            if (direction === 'right' || direction === 'down') {
                work = work.map(reverseRow);
            }

            // 对每一行 slideLeft
            let movedAny = false;
            let totalScore = 0;
            const newRows = [];
            for (let r = 0; r < SIZE; r++) {
                const res = slideLeft(work[r]);
                newRows.push(res.row);
                totalScore += res.score;
                // 检测是否真的发生变化
                for (let c = 0; c < SIZE; c++) {
                    const before = work[r][c];
                    const after  = res.row[c];
                    if (before === 0 && after === 0) continue;
                    if (before === 0 || after === 0) { movedAny = true; break; }
                    if (before.id !== after.id) { movedAny = true; break; }
                }
            }

            let next = newRows;
            if (direction === 'right' || direction === 'down') {
                next = next.map(reverseRow);
            }
            if (direction === 'up' || direction === 'down') {
                next = transpose(next);
            }

            return { board: next, moved: movedAny, score: totalScore };
        }

        // ============================================================
        //  渲染（DOM + CSS Grid + transition）
        // ============================================================

        function render() {
            // 清空 tile-layer，但保留 DOM 复用映射以触发 CSS transition
            const existing = new Map(); // id -> element
            for (const el of [...tileLayerEl.children]) {
                existing.set(el.dataset.tid | 0, el);
            }

            const seen = new Set();
            const size = cellSize();
            const gap  = cellGap();

            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = board[r][c];
                    if (!cell) continue;
                    const id = cell.id;
                    seen.add(id);

                    let el = existing.get(id);
                    const x = c * (size + gap);
                    const y = r * (size + gap);
                    const posTransform = `translate(${x}px, ${y}px)`;

                    if (!el) {
                        el = document.createElement('div');
                        el.className = 'tile';
                        el.dataset.tid = id;
                        el.style.width  = size + 'px';
                        el.style.height = size + 'px';
                        el.style.setProperty('--pos', posTransform);
                        el.style.transform = posTransform;
                        tileLayerEl.appendChild(el);
                    } else {
                        // 复用：更新 transform，CSS transition 自然生效
                        el.style.setProperty('--pos', posTransform);
                        el.style.transform = posTransform;
                    }

                    // 数据 / 外观
                    const v = cell.value;
                    el.dataset.v = v > 2048 ? 'big' : String(v);
                    el.textContent = v;

                    // 动画 class（先移除让动画能重新触发）
                    el.classList.remove('new', 'merged');
                    if (cell.isNew) {
                        // 强制 reflow 后再加 class 才能重启动画
                        void el.offsetWidth;
                        el.classList.add('new');
                    }
                    if (cell.justMerged) {
                        void el.offsetWidth;
                        el.classList.add('merged');
                    }
                }
            }

            // 删除不再存在的 tile（被合并消失的那一方）
            for (const [id, el] of existing) {
                if (!seen.has(id)) el.remove();
            }
        }

        function renderCellsBackground() {
            // 移除旧 cell（保留 tile-layer 与 overlay）
            [...gridEl.querySelectorAll('.cell')].forEach(el => el.remove());
            for (let i = 0; i < SIZE * SIZE; i++) {
                const c = document.createElement('div');
                c.className = 'cell';
                gridEl.insertBefore(c, tileLayerEl);
            }
        }

        // ============================================================
        //  状态 / 分数 / 胜负
        // ============================================================

        function setScore(v, animate = false) {
            score = v;
            scoreEl.textContent = score;
            if (animate) {
                scoreEl.classList.remove('bump');
                void scoreEl.offsetWidth;
                scoreEl.classList.add('bump');
            }
            if (score > bestBySize[SIZE]) {
                bestBySize[SIZE] = score;
                localStorage.setItem('oma_2048_best_by_size', JSON.stringify(bestBySize));
            }
            if (score > best) {
                best = score;
                localStorage.setItem('oma_2048_best', String(best));
            }
            bestEl.textContent = bestBySize[SIZE] || 0;
        }

        function hasEmpty() {
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (board[r][c] === 0) return true;
            return false;
        }

        function hasMergeablePair() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const v = board[r][c];
                    if (!v) continue;
                    if (c + 1 < SIZE && board[r][c + 1] && board[r][c + 1].value === v.value) return true;
                    if (r + 1 < SIZE && board[r + 1][c] && board[r + 1][c].value === v.value) return true;
                }
            }
            return false;
        }

        function checkWin() {
            if (hasWonOnce) return false;
            for (let r = 0; r < SIZE; r++)
                for (let c = 0; c < SIZE; c++)
                    if (board[r][c] && board[r][c].value >= 2048) {
                        hasWonOnce = true;
                        return true;
                    }
            return false;
        }

        function showOverlay(kind) {
            overlayEl.classList.remove('win');
            if (kind === 'win') {
                overlayEl.classList.add('show', 'win');
                overlayTitle.innerHTML = i18n.t('you_win') + '<br><span style="font-size:14px;font-weight:500;opacity:0.7;">' + i18n.t('you_win_sub') + '</span>';
                overlayBtn.textContent = i18n.t('keep_going');
            } else {
                overlayEl.classList.add('show');
                overlayTitle.textContent = i18n.t('game_over');
                overlayBtn.textContent = i18n.t('try_again');
            }
        }

        function hideOverlay() {
            overlayEl.classList.remove('show', 'win');
        }

        // ============================================================
        //  动作：处理一次方向输入
        // ============================================================

        function act(direction) {
            if (state.is('GAMEOVER')) return;
            if (state.is('WIN') && overlayEl.classList.contains('show')) {
                // 已停在 WIN 横幅上，忽略滑动直到玩家选择
                return;
            }

            const result = move(direction);
            if (!result.moved) {
                // 抖动提示（无法移动）
                gridEl.classList.remove('shake');
                void gridEl.offsetWidth;
                gridEl.classList.add('shake');
                return;
            }

            // 提交新棋盘
            board = result.board;

            // 清除上一轮的 isNew / justMerged 标记（但保留这次的）
            // 新一轮：所有现存 tile 都不再是 "new"，除非本回合新生成
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = board[r][c];
                    if (cell && !cell.justMerged && !cell.isNew) {
                        // 无动画状态
                    }
                }
            }

            // 加分
            if (result.score > 0) {
                setScore(score + result.score, true);
            } else {
                setScore(score);
            }

            // 渲染滑动动画（先渲染移动+合并）
            render();

            // 短暂延迟后生成新 tile，让滑动动画先完成
            setTimeout(() => {
                spawnTile();
                // 标记：刚生成的 tile 有 isNew=true，其余统一清掉标记
                for (let r = 0; r < SIZE; r++) {
                    for (let c = 0; c < SIZE; c++) {
                        const cell = board[r][c];
                        if (!cell) continue;
                        if (cell !== board[r][c]) continue;
                        // 上一回合的 justMerged / isNew 在新生成之前清掉
                    }
                }
                // 在 spawn 之前清掉旧标记 — 用 map 重做：
                // （此处 board 已包含新 tile，把除新 tile 外的标记清掉）
                cleanupTileFlags();

                render();

                // 胜负检查
                if (checkWin()) {
                    state.transition('win');
                    showOverlay('win');
                    return;
                }
                if (!hasEmpty() && !hasMergeablePair()) {
                    state.transition('lose');
                    showOverlay('gameover');
                }
            }, 110);
        }

        function cleanupTileFlags() {
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = board[r][c];
                    if (!cell) continue;
                    // 只保留本轮新增的 isNew / 本轮合并产生的 justMerged
                    // 在调用 render 之前，由调用方控制 — 这里默认全清，再由 spawn 单独标记
                    cell.justMerged = false;
                    cell.isNew = false;
                    // 合并后清掉 mergedFrom（不再需要）
                    if (cell.mergedFrom) delete cell.mergedFrom;
                }
            }
        }

        // ============================================================
        //  开局 / 切换棋盘大小
        // ============================================================

        function newGame(keepSize = true) {
            if (!keepSize) {
                // 由用户在切换棋盘时调用，SIZE 已经被改过
            }
            applySizeVars();
            renderCellsBackground();
            board = emptyBoard();
            hasWonOnce = false;
            state.set('PLAYING');
            hideOverlay();
            setScore(0);
            // 清空 tile-layer
            tileLayerEl.innerHTML = '';
            // 起手两个 tile
            spawnTile();
            spawnTile();
            render();
        }

        function setSize(newSize) {
            if (newSize === SIZE) return;
            SIZE = newSize;
            // 清掉所有 tile DOM（id 序号也重置）
            nextTileId = 1;
            tileLayerEl.innerHTML = '';
            newGame(true);
        }

        // ============================================================
        //  输入：键盘 / 触屏滑动
        // ============================================================

        const KEY_MAP = {
            'ArrowLeft': 'left',  'a': 'left',  'A': 'left',
            'ArrowRight': 'right','d': 'right', 'D': 'right',
            'ArrowUp': 'up',      'w': 'up',    'W': 'up',
            'ArrowDown': 'down',  's': 'down',  'S': 'down'
        };

        window.addEventListener('keydown', (e) => {
            const dir = KEY_MAP[e.key];
            if (dir) {
                e.preventDefault();
                act(dir);
            } else if (e.key === 'r' || e.key === 'R') {
                newGame(true);
            }
        });

        // 触屏滑动
        let touchStart = null;
        gridEl.addEventListener('touchstart', (e) => {
            const t = e.touches[0];
            touchStart = { x: t.clientX, y: t.clientY };
        }, { passive: true });

        gridEl.addEventListener('touchend', (e) => {
            if (!touchStart) return;
            const t = e.changedTouches[0];
            const dx = t.clientX - touchStart.x;
            const dy = t.clientY - touchStart.y;
            const ax = Math.abs(dx), ay = Math.abs(dy);
            const threshold = 24;
            if (Math.max(ax, ay) < threshold) { touchStart = null; return; }
            if (ax > ay) act(dx > 0 ? 'right' : 'left');
            else        act(dy > 0 ? 'down'  : 'up');
            touchStart = null;
        }, { passive: true });

        // 防止移动端双指缩放干扰棋盘
        gridEl.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

        // ============================================================
        //  UI 绑定
        // ============================================================

        sizeGroupEl.addEventListener('click', (e) => {
            const btn = e.target.closest('.size-btn');
            if (!btn) return;
            const newSize = parseInt(btn.dataset.size, 10);
            if (newSize === SIZE) return;
            [...sizeGroupEl.children].forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            setSize(newSize);
        });

        btnNew.addEventListener('click', () => newGame(true));

        overlayBtn.addEventListener('click', () => {
            if (state.is('WIN')) {
                // "继续"
                state.transition('keep');
                hideOverlay();
            } else {
                // game over → 新一局
                newGame(true);
            }
        });

        // 初次进入
        setScore(0);
        newGame(true);
    </script>
</body>
</html>
