<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OhMyAgent Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Light theme */
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --border-color: #e5e7eb;
            --border-hover: #d1d5db;
            --accent-primary: #8b5cf6;
            --accent-secondary: #7c3aed;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-accent: 0 4px 14px 0 rgba(139, 92, 246, 0.15);
        }

        [data-theme="dark"] {
            /* Dark theme */
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #141414;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --text-tertiary: #6b7280;
            --border-color: #1f1f1f;
            --border-hover: #2a2a2a;
            --accent-primary: #a78bfa;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #a78bfa 0%, #818cf8 100%);
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4), 0 4px 6px -2px rgba(0, 0, 0, 0.3);
            --shadow-accent: 0 4px 14px 0 rgba(139, 92, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 18px;
            color: var(--text-primary);
            text-decoration: none;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-button {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .icon-button:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .icon-button:focus {
            outline: 2px solid var(--accent-primary);
            outline-offset: 2px;
        }

        /* Hero */
        .hero {
            text-align: center;
            padding: 80px 0 60px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .hero-badge i {
            width: 14px;
            height: 14px;
            color: var(--accent-primary);
        }

        .hero h1 {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 16px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Games Grid */
        .games-section {
            padding: 40px 0 80px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .game-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-4px);
            box-shadow: var(--shadow-accent);
        }

        .game-thumbnail {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .game-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .game-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .game-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
            flex: 1;
        }

        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }

        .game-tags {
            display: flex;
            gap: 8px;
        }

        .game-tag {
            font-size: 11px;
            padding: 4px 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .play-button {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: var(--accent-gradient);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .game-card:hover .play-button {
            transform: scale(1.05);
        }

        .play-button i {
            width: 16px;
            height: 16px;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 40px 0;
            text-align: center;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--accent-primary);
        }

        .footer-copyright {
            font-size: 13px;
            color: var(--text-tertiary);
        }

        /* Responsive */
        @media (max-width: 640px) {
            .hero {
                padding: 60px 0 40px;
            }

            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }

            .header-controls {
                gap: 8px;
            }
        }

        /* Animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card {
            animation: fadeInUp 0.5s ease forwards;
        }

        .game-card:nth-child(1) { animation-delay: 0.1s; }
        .game-card:nth-child(2) { animation-delay: 0.2s; }
        .game-card:nth-child(3) { animation-delay: 0.3s; }
        .game-card:nth-child(4) { animation-delay: 0.4s; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <a href="https://games.ohmyagent.ai" class="logo">
                    <div class="logo-icon">
                        <i data-lucide="gamepad-2"></i>
                    </div>
                    <span data-i18n="site_title">OhMyAgent Games</span>
                </a>
                <div class="header-controls">
                    <button class="icon-button" id="lang-toggle" aria-label="Toggle Language">
                        <i data-lucide="languages"></i>
                    </button>
                    <button class="icon-button" id="theme-toggle" aria-label="Toggle Theme">
                        <i data-lucide="sun"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero">
            <h1 data-i18n="hero_title">Game Demo Hub</h1>
            <p data-i18n="hero_description">Lightweight HTML5 games powered by AI-driven development</p>
        </section>

        <section class="games-section">
            <div class="games-grid">
                <!-- Game Card: TANK COMMAND -->
                <a class="game-card" href="tank.html">
                    <img src="screenshot-tank.png" alt="TANK COMMAND" class="game-thumbnail">
                    <div class="game-content">
                        <h3 class="game-title" data-i18n="tank_title">TANK COMMAND</h3>
                        <p class="game-description" data-i18n="tank_description">
                            Classic tank battle game with military HUD style. Customize enemy count, difficulty, and bullet patterns.
                        </p>
                        <div class="game-footer">
                            <div class="play-button">
                                <span data-i18n="play_button">Play</span>
                                <i data-lucide="play"></i>
                            </div>
                        </div>
                    </div>
                </a>

                <!-- Add more game cards here following the same pattern -->
                <!-- Example for future games:
                <a class="game-card" href="game2.html">
                    <img src="screenshot-game2.png" alt="GAME NAME" class="game-thumbnail">
                    <div class="game-content">
                        <h3 class="game-title">GAME NAME</h3>
                        <p class="game-description" data-i18n="game2_description">
                            Game description goes here...
                        </p>
                        <div class="game-footer">
                            <div class="game-tags">
                                <span class="game-tag">Tag1</span>
                                <span class="game-tag">Tag2</span>
                            </div>
                            <div class="play-button">
                                <span data-i18n="play_button">Play</span>
                                <i data-lucide="play"></i>
                            </div>
                        </div>
                    </div>
                </a>
                -->
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <a href="https://ohmyagent.ai" target="_blank" rel="noopener">OhMyAgent</a>
                    <a href="https://github.com/yourusername/oma-games" target="_blank" rel="noopener">GitHub</a>
                </div>
                <p class="footer-copyright">© 2024 OhMyAgent. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // i18n configuration
        const translations = {
            en: {
                site_title: 'OhMyAgent Games',
                hero_title: 'Game Center',
                hero_description: 'Lightweight HTML5 games powered by Vibe Coding development',
                tank_title: 'Tank Command',
                tank_description: 'Lightweight HTML5 games powered by Vibe Coding development',
                play_button: 'Play'
            },
            zh: {
                site_title: 'OhMyAgent 游戏中心',
                hero_title: '游戏中心',
                hero_description: '由 Vibe Coding 开发模式实现的轻量级 HTML5 游戏',
                tank_title: '坦克大战',
                tank_description: '由 Vibe Coding 开发模式实现的轻量级 HTML5 游戏',
                play_button: '开始游戏'
            }
        };

        // State management
        let currentLang = localStorage.getItem('oma_games_lang') || 'zh';
        let currentTheme = localStorage.getItem('oma_games_theme') || 'dark';

        // DOM elements
        const langToggle = document.getElementById('lang-toggle');
        const themeToggle = document.getElementById('theme-toggle');

        // Language toggle function
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('oma_games_lang', lang);

            // Update all elements with data-i18n attribute
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) {
                    element.textContent = translations[lang][key];
                }
            });

            // Update document language
            document.documentElement.lang = lang;
        }

        // Theme toggle function
        function setTheme(theme) {
            currentTheme = theme;
            localStorage.setItem('oma_games_theme', theme);

            // Update document attribute
            document.documentElement.setAttribute('data-theme', theme);

            // Update icon
            const icon = themeToggle.querySelector('i');
            if (theme === 'dark') {
                icon.setAttribute('data-lucide', 'sun');
            } else {
                icon.setAttribute('data-lucide', 'moon');
            }

            // Recreate icons
            lucide.createIcons();
        }

        // Event listeners
        langToggle.addEventListener('click', () => {
            setLanguage(currentLang === 'en' ? 'zh' : 'en');
        });

        themeToggle.addEventListener('click', () => {
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        // Initialize
        setLanguage(currentLang);
        setTheme(currentTheme);
    </script>
</body>
</html>
