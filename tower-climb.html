<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOWER CLIMB — 是男人就下100层</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Russo+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../shared/oma-games.css">
    <style>
        :root {
            --industrial-bg: #1a1a1a;
            --industrial-bg-dark: #0d0d0d;
            --industrial-bg-deep: #060606;
            --warn-orange: #ff8c1a;
            --warn-orange-dim: #b35e00;
            --warn-orange-glow: rgba(255, 140, 26, 0.55);
            --danger-red: #ff3030;
            --danger-red-glow: rgba(255, 48, 48, 0.6);
            --moving-purple: #a78bfa;
            --moving-purple-dim: #6d4ed6;
            --grid-far: #2a1a3a;
            --grid-near: #3a2a4a;
            --steel: #4a4a4a;
            --steel-dim: #2a2a2a;
            --text-industrial: #e8d4b0;
            --text-dim-industrial: #8a7a5a;

            --bg-primary: var(--industrial-bg-deep);
            --bg-secondary: var(--industrial-bg-dark);
            --bg-card: var(--industrial-bg);
            --text-primary: var(--text-industrial);
            --text-secondary: var(--text-dim-industrial);
            --text-dim: #5a4a2a;
            --border: var(--steel-dim);
            --border-strong: var(--warn-orange-dim);
            --accent: var(--warn-orange);
            --accent-strong: var(--warn-orange);
            --accent-contrast: #0d0d0d;
        }

        [data-theme="light"] {
            --industrial-bg: #d8d0c0;
            --industrial-bg-dark: #c4baa8;
            --industrial-bg-deep: #e8e0d0;
            --text-industrial: #2a1a0a;
            --text-dim-industrial: #5a4a2a;
            --steel: #8a7a5a;
            --steel-dim: #a89a78;
            --grid-far: #b8a890;
            --grid-near: #988878;
            --bg-primary: var(--industrial-bg-deep);
            --bg-secondary: var(--industrial-bg-dark);
            --bg-card: var(--industrial-bg);
            --text-primary: var(--text-industrial);
            --text-secondary: var(--text-dim-industrial);
            --border: var(--steel-dim);
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--industrial-bg-deep);
            color: var(--text-industrial);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
            background-image:
                repeating-linear-gradient(90deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 80px),
                repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 80px);
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 99;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                transparent 70%,
                rgba(0, 0, 0, 0.5) 100%
            );
        }

        #app {
            display: flex;
            gap: 24px;
            align-items: stretch;
            position: relative;
            z-index: 1;
        }

        .game-panel {
            background: var(--bg-card);
            border: 2px solid var(--steel-dim);
            box-shadow:
                inset 0 0 40px rgba(0, 0, 0, 0.6),
                0 0 30px rgba(255, 140, 26, 0.08);
            position: relative;
            padding: 14px;
        }

        .game-panel::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            pointer-events: none;
            background:
                linear-gradient(135deg, var(--warn-orange-dim) 0%, transparent 4%, transparent 96%, var(--warn-orange-dim) 100%);
            z-index: -1;
        }

        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            margin-bottom: 12px;
            border: 2px solid var(--warn-orange-dim);
            background: var(--industrial-bg-dark);
            font-family: 'Russo One', sans-serif;
            letter-spacing: 2px;
            position: relative;
        }

        #hud::before, #hud::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 6px;
            height: 6px;
            background: var(--warn-orange);
            transform: translateY(-50%);
            box-shadow: 0 0 6px var(--warn-orange-glow);
        }
        #hud::before { left: -3px; }
        #hud::after { right: -3px; }

        .hud-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .hud-label {
            color: var(--text-dim-industrial);
            font-size: 10px;
            font-family: 'Share Tech Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .hud-value {
            color: var(--warn-orange);
            font-family: 'Black Ops One', sans-serif;
            font-size: 24px;
            text-shadow: 0 0 8px var(--warn-orange-glow);
            line-height: 1;
        }

        .hud-value.depth {
            font-size: 32px;
            min-width: 110px;
        }

        .hud-value.danger {
            color: var(--danger-red);
            text-shadow: 0 0 8px var(--danger-red-glow);
            animation: pulse 0.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        canvas {
            display: block;
            background: var(--industrial-bg-dark);
            border: 1px solid var(--steel-dim);
            box-shadow:
                inset 0 0 20px rgba(0, 0, 0, 0.8),
                0 0 25px rgba(255, 140, 26, 0.12);
        }

        #config-panel {
            width: 280px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .panel-title {
            font-family: 'Black Ops One', sans-serif;
            font-size: 26px;
            color: var(--warn-orange);
            text-shadow: 0 0 10px var(--warn-orange-glow);
            letter-spacing: 3px;
            text-align: center;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--warn-orange-dim);
            line-height: 1.1;
        }

        .panel-subtitle {
            font-size: 11px;
            color: var(--text-dim-industrial);
            text-align: center;
            letter-spacing: 1px;
            margin-top: -8px;
        }

        .config-group {
            background: var(--industrial-bg-dark);
            border: 1px solid var(--steel-dim);
            padding: 12px;
            position: relative;
        }

        .config-group::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 8px;
            height: 8px;
            border-top: 2px solid var(--warn-orange-dim);
            border-left: 2px solid var(--warn-orange-dim);
        }

        .config-group label {
            display: block;
            font-size: 11px;
            color: var(--text-dim-industrial);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
            font-family: 'Share Tech Mono', monospace;
        }

        .config-group label::before {
            content: '▶ ';
            color: var(--warn-orange);
        }

        .hint {
            font-size: 10px;
            color: var(--text-dim-industrial);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        .oma-diff-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
        }

        .oma-diff-btn {
            font-family: 'Share Tech Mono', monospace;
            background: var(--industrial-bg-deep);
            color: var(--text-industrial);
            border: 1px solid var(--steel-dim);
            padding: 8px 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .oma-diff-btn:hover {
            border-color: var(--warn-orange);
            color: var(--warn-orange);
        }
        .oma-diff-btn.active {
            background: var(--warn-orange);
            color: var(--industrial-bg-deep);
            border-color: var(--warn-orange);
            box-shadow: 0 0 10px var(--warn-orange-glow);
            font-weight: bold;
        }

        #btn-start {
            padding: 14px;
            font-family: 'Black Ops One', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            background: var(--warn-orange);
            color: var(--industrial-bg-deep);
            border: 2px solid var(--warn-orange);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px var(--warn-orange-glow);
            text-transform: uppercase;
        }

        #btn-start:hover:not(:disabled) {
            background: var(--industrial-bg-deep);
            color: var(--warn-orange);
            box-shadow: 0 0 25px var(--warn-orange-glow);
        }

        #btn-start:disabled {
            background: var(--steel-dim);
            border-color: var(--steel-dim);
            color: var(--text-dim);
            cursor: not-allowed;
            box-shadow: none;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 12px;
            font-size: 12px;
        }
        .stat-grid .lbl { color: var(--text-dim-industrial); }
        .stat-grid .val {
            color: var(--warn-orange);
            text-align: right;
            font-family: 'Share Tech Mono', monospace;
        }

        #controls-help {
            font-size: 11px;
            line-height: 2;
            color: var(--text-dim-industrial);
            padding-top: 12px;
            border-top: 1px dashed var(--steel-dim);
        }
        #controls-help .row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .oma-key {
            background: var(--industrial-bg-deep);
            border: 1px solid var(--steel-dim);
            border-bottom-width: 2px;
            color: var(--warn-orange);
            font-family: 'Share Tech Mono', monospace;
            padding: 2px 6px;
            min-width: 22px;
            text-align: center;
            display: inline-block;
        }

        /* === Unified game header theme overrides (shared/oma-games.css) === */
        :root {
            --oma-header-bg: rgba(26, 26, 26, 0.7);
            --oma-header-hover-bg: #ff8c1a;
            --oma-header-hover-fg: #1a1a1a;
            --oma-header-border: rgba(255, 140, 26, 0.4);
            --oma-header-glow: rgba(255, 140, 26, 0.4);
        }
        .oma-game-header { font-family: 'Russo One', sans-serif; }

        .legend {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 11px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-swatch {
            width: 24px;
            height: 6px;
            display: inline-block;
            border: 1px solid rgba(0,0,0,0.4);
        }
        .legend-swatch.normal { background: var(--warn-orange); }
        .legend-swatch.spike { background: var(--danger-red); }
        .legend-swatch.moving { background: var(--moving-purple); }

        @media (max-width: 900px) {
            #app { flex-direction: column; }
            #config-panel { width: 100%; max-width: 500px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="game-panel">
            <div id="hud">
                <div class="hud-block">
                    <span class="hud-label" data-i18n="depth">深度</span>
                    <span class="hud-value depth" id="depth">0m</span>
                </div>
                <div class="hud-block">
                    <span class="hud-label" data-i18n="speed">速度</span>
                    <span class="hud-value" id="speed">×1.0</span>
                </div>
                <div class="hud-block">
                    <span class="hud-label" data-i18n="high_score">最深</span>
                    <span class="hud-value" id="high-score">0m</span>
                </div>
            </div>
            <canvas id="canvas" width="500" height="700"></canvas>
        </div>

        <div class="game-panel" id="config-panel">
            <div>
                <div class="panel-title" data-i18n="title">TOWER CLIMB</div>
                <div class="panel-subtitle" data-i18n="subtitle">下落求生 · DESCEND OR DIE</div>
            </div>

            <div class="config-group">
                <label data-i18n="difficulty">难度</label>
                <div class="oma-diff-group" id="diff-group">
                    <button class="oma-diff-btn active" data-level="beginner">初级</button>
                    <button class="oma-diff-btn" data-level="intermediate">中级</button>
                    <button class="oma-diff-btn" data-level="advanced">高级</button>
                </div>
                <div class="hint" data-i18n="diff_hint">重力 / 平台密度 / 死亡线</div>
            </div>

            <button id="btn-start"><span data-i18n="descend">▶ 开始下落</span></button>

            <div class="config-group">
                <label data-i18n="stats">状态</label>
                <div class="stat-grid">
                    <span class="lbl" data-i18n="high_score">最深</span>
                    <span class="val" id="high-score-2">0m</span>
                    <span class="lbl" data-i18n="platforms_passed">已穿越</span>
                    <span class="val" id="platforms-passed">0</span>
                    <span class="lbl" data-i18n="gravity_label">重力</span>
                    <span class="val" id="gravity-val">0.40</span>
                </div>
            </div>

            <div class="config-group">
                <label data-i18n="legend">平台图例</label>
                <div class="legend">
                    <div class="legend-item">
                        <span class="legend-swatch normal"></span>
                        <span data-i18n="legend_normal">普通 · 可站立</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch spike"></span>
                        <span data-i18n="legend_spike">尖刺 · 致命</span>
                    </div>
                    <div class="legend-item">
                        <span class="legend-swatch moving"></span>
                        <span data-i18n="legend_moving">移动 · 高级专属</span>
                    </div>
                </div>
            </div>

            <div id="controls-help">
                <div class="row">
                    <span class="oma-key">←</span>
                    <span class="oma-key">→</span>
                    <span>/</span>
                    <span class="oma-key">A</span>
                    <span class="oma-key">D</span>
                    <span data-i18n="move">水平移动</span>
                </div>
                <div class="row">
                    <span class="oma-key">ENTER</span>
                    <span data-i18n="start">开始</span>
                    &nbsp;
                    <span class="oma-key">R</span>
                    <span data-i18n="restart">重玩</span>
                </div>
                <div class="hint" data-i18n="tip_hint" style="margin-top:6px;">提示: 别被顶部红色死亡线追上!</div>
            </div>
        </div>
    </div>

    <script src="../shared/oma-games.js"></script>
    <script>
        const { i18n, theme, input, loop, fsm, clamp, randInt, pick } = OmaGames;

        i18n.load({
            zh: {
                title: 'TOWER CLIMB',
                subtitle: '下落求生 · DESCEND OR DIE',
                difficulty: '难度',
                diff_hint: '重力 / 平台密度 / 死亡线',
                descend: '▶ 开始下落',
                stats: '状态',
                high_score: '最深',
                platforms_passed: '已穿越',
                gravity_label: '重力',
                legend: '平台图例',
                legend_normal: '普通 · 可站立',
                legend_spike: '尖刺 · 致命',
                legend_moving: '移动 · 高级专属',
                depth: '深度',
                speed: '速度',
                move: '水平移动',
                start: '开始',
                restart: '重玩',
                tip_hint: '提示: 别被顶部红色死亡线追上!',
                press_start: '按 [ ENTER ] 或点击 [ 开始下落 ]',
                game_over: '坠落终止',
                game_over_sub: '死亡线已吞没你',
                press_retry: '按 [ R ] 重试',
                death_zone: '⚠ 死亡区 ⚠',
                meters_unit: 'm',
                floor_label: 'F-'
            },
            en: {
                title: 'TOWER CLIMB',
                subtitle: 'DESCEND OR DIE',
                difficulty: 'Difficulty',
                diff_hint: 'Gravity / Density / Death Line',
                descend: '▶ BEGIN DESCENT',
                stats: 'Status',
                high_score: 'Deepest',
                platforms_passed: 'Cleared',
                gravity_label: 'Gravity',
                legend: 'Platform Legend',
                legend_normal: 'Normal · Standable',
                legend_spike: 'Spikes · Lethal',
                legend_moving: 'Moving · Advanced Only',
                depth: 'DEPTH',
                speed: 'SPEED',
                move: 'Move',
                start: 'Start',
                restart: 'Retry',
                tip_hint: 'Tip: Outrun the red death line at the top!',
                press_start: 'PRESS [ ENTER ] OR CLICK [ BEGIN DESCENT ]',
                game_over: 'DESCENT TERMINATED',
                game_over_sub: 'The death zone consumed you',
                press_retry: 'PRESS [ R ] TO RETRY',
                death_zone: '⚠ DEATH ZONE ⚠',
                meters_unit: 'm',
                floor_label: 'F-'
            }
        });
        theme.init();
        input.init();

        OmaGames.ui.header();

        // ===== Canvas & DOM =====
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;   // 500
        const H = canvas.height;  // 700

        const depthEl = document.getElementById('depth');
        const speedEl = document.getElementById('speed');
        const highScoreEl = document.getElementById('high-score');
        const highScore2El = document.getElementById('high-score-2');
        const platformsPassedEl = document.getElementById('platforms-passed');
        const gravityValEl = document.getElementById('gravity-val');
        const btnStart = document.getElementById('btn-start');

        // ===== FSM =====
        const machine = fsm({
            MENU:     { start: 'PLAYING' },
            PLAYING:  { die: 'GAMEOVER' },
            GAMEOVER: { restart: 'PLAYING' }
        }, 'MENU');

        // ===== Difficulty params =====
        const DIFF_PARAMS = {
            beginner: {
                gravity: 0.32,
                moveSpeed: 4.2,
                platMinW: 130, platMaxW: 200,
                platGapMin: 80, platGapMax: 120,
                deathSpeed: 0.18,   // pixels per frame chase
                deathStartOffset: 80,
                spikeChance: 0.0,
                movingChance: 0.0
            },
            intermediate: {
                gravity: 0.42,
                moveSpeed: 4.6,
                platMinW: 95, platMaxW: 160,
                platGapMin: 70, platGapMax: 105,
                deathSpeed: 0.32,
                deathStartOffset: 70,
                spikeChance: 0.12,
                movingChance: 0.0
            },
            advanced: {
                gravity: 0.55,
                moveSpeed: 5.0,
                platMinW: 70, platMaxW: 130,
                platGapMin: 60, platGapMax: 95,
                deathSpeed: 0.5,
                deathStartOffset: 55,
                spikeChance: 0.20,
                movingChance: 0.25
            }
        };

        let config = { difficulty: 'beginner' };
        let deepestEver = 0;

        try {
            const stored = parseInt(localStorage.getItem('tower_climb_high') || '0', 10);
            if (!isNaN(stored)) deepestEver = stored;
        } catch (e) {}
        highScoreEl.textContent = deepestEver + 'm';
        highScore2El.textContent = deepestEver + 'm';

        document.querySelectorAll('#diff-group .oma-diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('#diff-group .oma-diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                config.difficulty = btn.dataset.level;
                gravityValEl.textContent = DIFF_PARAMS[config.difficulty].gravity.toFixed(2);
            });
        });
        gravityValEl.textContent = DIFF_PARAMS[config.difficulty].gravity.toFixed(2);
        btnStart.addEventListener('click', () => game.start());

        // ===== Game =====
        const PLAYER_W = 26;
        const PLAYER_H = 32;
        const MAX_VY = 12;

        const game = {
            params: DIFF_PARAMS.beginner,
            player: null,
            platforms: [],
            particles: [],
            floorMarkers: [],     // {worldY, label} for parallax "F-23" labels
            cameraY: 0,           // world y at top of screen
            deathLineY: 0,        // world y - if player.y < this => death
            deathActiveY: 0,      // the moving chase line
            startY: 0,
            maxDepth: 0,
            platformsPassed: 0,
            lastPlatformY: 0,
            shakeT: 0,
            timeAlive: 0,

            start() {
                this.params = DIFF_PARAMS[config.difficulty];
                this.platforms = [];
                this.particles = [];
                this.floorMarkers = [];
                this.platformsPassed = 0;
                this.maxDepth = 0;
                this.timeAlive = 0;
                this.shakeT = 0;

                // Player starts at world y = 0 (top), camera centers below
                const startY = 0;
                this.startY = startY;
                this.player = {
                    x: W / 2 - PLAYER_W / 2,
                    y: startY - PLAYER_H,
                    w: PLAYER_W,
                    h: PLAYER_H,
                    vx: 0,
                    vy: 0,
                    onPlatform: null,
                    facing: 1,
                    trail: []
                };
                // Camera: player starts near top, camera centers player at 0.4*H
                this.cameraY = this.player.y - H * 0.4;

                // Death line begins above player by offset, slowly descends
                this.deathActiveY = this.cameraY - this.params.deathStartOffset;
                this.deathLineY = this.deathActiveY;

                // Generate initial platforms: first one directly under player to land on
                this.lastPlatformY = this.player.y + 60;
                this.platforms.push({
                    x: W / 2 - 80,
                    y: this.lastPlatformY,
                    w: 160,
                    h: 12,
                    type: 'normal',
                    vx: 0,
                    phase: 0,
                    passed: false
                });

                // Generate platforms down through visible area + buffer
                while (this.lastPlatformY < this.cameraY + H + 300) {
                    this.spawnNextPlatform();
                }

                // Floor markers: pre-seed (player at y=0, descent grows y positive)
                for (let i = -2; i < 40; i++) {
                    const my = i * 200;
                    this.floorMarkers.push({
                        worldY: my,
                        label: 'F-' + Math.abs(i)
                    });
                }

                machine.set('PLAYING');
                machine.current = 'PLAYING';
                btnStart.disabled = true;
                this.updateHud();
            },

            spawnNextPlatform() {
                const gap = randInt(this.params.platGapMin, this.params.platGapMax);
                const newY = this.lastPlatformY + gap;
                const w = randInt(this.params.platMinW, this.params.platMaxW);
                const maxX = W - w - 8;
                const x = randInt(8, Math.max(10, maxX));

                let type = 'normal';
                const r = Math.random();
                if (this.platforms.length > 3) {  // safety: first few are normal
                    if (r < this.params.spikeChance) type = 'spike';
                    else if (r < this.params.spikeChance + this.params.movingChance) type = 'moving';
                }

                this.platforms.push({
                    x, y: newY, w, h: 12,
                    type,
                    vx: type === 'moving' ? (Math.random() < 0.5 ? -1 : 1) * 1.4 : 0,
                    phase: Math.random() * Math.PI * 2,
                    passed: false
                });
                this.lastPlatformY = newY;
            },

            update(dt) {
                if (machine.is('MENU')) {
                    if (input.pressed('Enter')) this.start();
                    return;
                }
                if (machine.is('GAMEOVER')) {
                    if (input.pressed('r', 'R')) this.start();
                    return;
                }

                if (!machine.is('PLAYING')) return;

                this.timeAlive += dt;

                const p = this.player;

                // --- Horizontal input ---
                let dx = 0;
                if (input.pressed('ArrowLeft', 'a', 'A')) { dx -= 1; p.facing = -1; }
                if (input.pressed('ArrowRight', 'd', 'D')) { dx += 1; p.facing = 1; }
                p.vx = dx * this.params.moveSpeed;
                p.x += p.vx;

                // Wrap horizontally — falling off either side wraps to the other
                if (p.x + p.w < 0) p.x = W;
                else if (p.x > W) p.x = -p.w;

                // --- Gravity ---
                p.vy += this.params.gravity;
                if (p.vy > MAX_VY) p.vy = MAX_VY;

                const prevBottom = p.y + p.h;
                p.y += p.vy;
                const newBottom = p.y + p.h;

                // --- Moving platforms update ---
                for (const plat of this.platforms) {
                    if (plat.type === 'moving') {
                        plat.x += plat.vx;
                        if (plat.x <= 4) { plat.x = 4; plat.vx *= -1; }
                        else if (plat.x + plat.w >= W - 4) { plat.x = W - 4 - plat.w; plat.vx *= -1; }
                    }
                    plat.phase += 0.05;
                }

                // --- Collision: only when falling ---
                p.onPlatform = null;
                if (p.vy > 0) {
                    for (const plat of this.platforms) {
                        const wasAbove = prevBottom <= plat.y + 1;
                        const isOverX = p.x + p.w > plat.x + 2 && p.x < plat.x + plat.w - 2;
                        const nowBelow = newBottom >= plat.y;
                        if (wasAbove && isOverX && nowBelow) {
                            if (plat.type === 'spike') {
                                // Death by spike
                                this.die();
                                return;
                            }
                            // Land on platform
                            p.y = plat.y - p.h;
                            p.vy = 0;
                            p.onPlatform = plat;
                            // Ride moving platform
                            if (plat.type === 'moving') {
                                p.x += plat.vx;
                            }
                            // Mark passed
                            if (!plat.passed) {
                                plat.passed = true;
                                this.platformsPassed++;
                            }
                            // Dust particles on landing
                            for (let i = 0; i < 6; i++) {
                                this.particles.push({
                                    x: p.x + p.w / 2 + (Math.random() - 0.5) * p.w,
                                    y: plat.y,
                                    vx: (Math.random() - 0.5) * 2,
                                    vy: -Math.random() * 1.5,
                                    life: 30,
                                    maxLife: 30,
                                    color: '#8a7a5a'
                                });
                            }
                            break;
                        }
                    }
                }

                // --- Trail ---
                if (Math.abs(p.vx) > 0.1 || Math.abs(p.vy) > 1) {
                    p.trail.push({ x: p.x + p.w / 2, y: p.y + p.h / 2, life: 14 });
                    if (p.trail.length > 12) p.trail.shift();
                }
                p.trail.forEach(t => t.life--);
                p.trail = p.trail.filter(t => t.life > 0);

                // --- Particles update ---
                this.particles.forEach(pt => {
                    pt.x += pt.vx;
                    pt.y += pt.vy;
                    pt.vy += 0.15;
                    pt.life--;
                });
                this.particles = this.particles.filter(pt => pt.life > 0);

                // --- Camera smooth follow ---
                const targetCamY = p.y - H * 0.4;
                this.cameraY += (targetCamY - this.cameraY) * 0.1;

                // --- Death line: chase camera smoothly from above ---
                // Slowly creeps down toward camera; if it catches player, game over.
                const chaseTarget = this.cameraY - this.params.deathStartOffset * 0.6;
                this.deathActiveY += (chaseTarget - this.deathActiveY) * 0.04;
                // Constant downward push (difficulty)
                this.deathActiveY += this.params.deathSpeed;
                this.deathLineY = this.deathActiveY;

                // --- Death check: player above death line ---
                if (p.y < this.deathLineY) {
                    this.die();
                    return;
                }

                // --- Generate more platforms below camera ---
                while (this.lastPlatformY < this.cameraY + H + 300) {
                    this.spawnNextPlatform();
                }

                // --- Cleanup platforms far above camera ---
                this.platforms = this.platforms.filter(pl => pl.y > this.cameraY - 200);

                // --- Floor markers: extend in descent direction ---
                let furthestMarker = -Infinity;
                for (const m of this.floorMarkers) furthestMarker = Math.max(furthestMarker, m.worldY);
                while (furthestMarker < this.cameraY + H + 500) {
                    furthestMarker += 200;
                    this.floorMarkers.push({
                        worldY: furthestMarker,
                        label: 'F-' + Math.abs(Math.floor(furthestMarker / 200))
                    });
                }
                this.floorMarkers = this.floorMarkers.filter(m => m.worldY > this.cameraY - 200);

                // --- Score: depth in meters (1m = 5px) ---
                const depth = Math.max(0, Math.floor((p.y - this.startY) / 5));
                if (depth > this.maxDepth) this.maxDepth = depth;

                // --- Screen shake when close to death ---
                const dangerDist = this.deathLineY - p.y;  // negative when dead
                if (dangerDist < 80) {
                    this.shakeT = Math.max(this.shakeT, (80 - dangerDist) / 80);
                } else {
                    this.shakeT *= 0.9;
                }

                this.updateHud();
            },

            die() {
                machine.current = 'GAMEOVER';
                btnStart.disabled = false;
                // Explosion of particles
                const p = this.player;
                for (let i = 0; i < 30; i++) {
                    this.particles.push({
                        x: p.x + p.w / 2,
                        y: p.y + p.h / 2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 40,
                        maxLife: 40,
                        color: i % 2 ? '#ff3030' : '#ff8c1a'
                    });
                }
                this.shakeT = 1.5;
                if (this.maxDepth > deepestEver) {
                    deepestEver = this.maxDepth;
                    try { localStorage.setItem('tower_climb_high', String(deepestEver)); } catch (e) {}
                    highScoreEl.textContent = deepestEver + 'm';
                    highScore2El.textContent = deepestEver + 'm';
                }
                this.updateHud();
            },

            updateHud() {
                depthEl.textContent = this.maxDepth + i18n.t('meters_unit');
                const speedRatio = this.player ? Math.abs(this.player.vy) / MAX_VY : 0;
                speedEl.textContent = '×' + (1 + speedRatio * 1.5).toFixed(1);
                platformsPassedEl.textContent = this.platformsPassed;
                // Pulse depth red when close to death line
                if (this.player && this.deathLineY - this.player.y < 80) {
                    depthEl.classList.add('danger');
                } else {
                    depthEl.classList.remove('danger');
                }
            },

            // ====== DRAW ======
            draw() {
                const sx = this.shakeT > 0.05 ? (Math.random() - 0.5) * this.shakeT * 6 : 0;
                const sy = this.shakeT > 0.05 ? (Math.random() - 0.5) * this.shakeT * 6 : 0;

                ctx.save();
                ctx.translate(sx, sy);

                // Background
                ctx.fillStyle = '#0d0d0d';
                ctx.fillRect(-10, -10, W + 20, H + 20);

                this.drawParallaxBackground();

                if (machine.is('MENU')) {
                    this.drawMenu();
                    ctx.restore();
                    return;
                }

                // Translate world to screen
                // screenY = worldY - cameraY

                // Draw floor markers (parallax far layer)
                this.drawFloorMarkers();

                // Draw platforms
                for (const plat of this.platforms) {
                    this.drawPlatform(plat);
                }

                // Draw player trail
                this.drawPlayerTrail();

                // Draw player
                if (machine.is('PLAYING') || machine.is('GAMEOVER')) {
                    this.drawPlayer();
                }

                // Draw particles
                for (const pt of this.particles) {
                    const alpha = pt.life / pt.maxLife;
                    ctx.fillStyle = pt.color;
                    ctx.globalAlpha = alpha;
                    const sy2 = pt.y - this.cameraY;
                    ctx.fillRect(pt.x - 2, sy2 - 2, 4, 4);
                }
                ctx.globalAlpha = 1;

                // Death line overlay
                this.drawDeathLine();

                ctx.restore();

                // Game over overlay (no shake)
                if (machine.is('GAMEOVER')) {
                    this.drawGameOver();
                }
            },

            drawParallaxBackground() {
                // Far layer: large dark purple grid, slow parallax (0.3x)
                const farOffset = (-this.cameraY * 0.3) % 60;
                ctx.strokeStyle = '#2a1a3a';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let x = 0; x <= W; x += 60) {
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                }
                for (let y = farOffset; y <= H; y += 60) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                }
                ctx.stroke();

                // Near layer: smaller brighter grid, faster parallax (0.6x)
                const nearOffset = (-this.cameraY * 0.6) % 30;
                ctx.strokeStyle = 'rgba(58, 42, 74, 0.5)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                for (let y = nearOffset; y <= H; y += 30) {
                    ctx.moveTo(0, y);
                    ctx.lineTo(W, y);
                }
                ctx.stroke();

                // Vertical "descent streaks" - subtle
                ctx.strokeStyle = 'rgba(255, 140, 26, 0.04)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 5; i++) {
                    const x = (i * 113) % W;
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, H);
                    ctx.stroke();
                }
            },

            drawFloorMarkers() {
                ctx.font = '11px "Share Tech Mono", monospace';
                ctx.textAlign = 'left';
                for (const m of this.floorMarkers) {
                    const sy = m.worldY - this.cameraY;
                    if (sy < -20 || sy > H + 20) continue;
                    // parallax: 0.7 factor for markers
                    const parallaxY = sy * 0.7 + H * 0.15;
                    if (parallaxY < -20 || parallaxY > H + 20) continue;
                    ctx.fillStyle = 'rgba(138, 122, 90, 0.25)';
                    ctx.fillText(m.label, 8, parallaxY);
                    ctx.fillText(m.label, W - 50, parallaxY);
                }
                ctx.textAlign = 'start';
            },

            drawPlatform(plat) {
                const sy = plat.y - this.cameraY;
                if (sy < -30 || sy > H + 30) return;

                const x = plat.x;
                const w = plat.w;
                const h = plat.h;

                if (plat.type === 'spike') {
                    // Red base with triangles
                    ctx.fillStyle = '#ff3030';
                    ctx.shadowColor = '#ff3030';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(x, sy + 4, w, h - 4);
                    ctx.shadowBlur = 0;
                    // Triangles
                    ctx.fillStyle = '#ff5050';
                    const triCount = Math.floor(w / 10);
                    ctx.beginPath();
                    for (let i = 0; i < triCount; i++) {
                        const tx = x + i * 10;
                        ctx.moveTo(tx, sy + 4);
                        ctx.lineTo(tx + 5, sy - 4);
                        ctx.lineTo(tx + 10, sy + 4);
                    }
                    ctx.fill();
                    // dark outline
                    ctx.strokeStyle = '#8a0000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x, sy + 2, w, h);
                } else if (plat.type === 'moving') {
                    // Purple base
                    ctx.fillStyle = '#a78bfa';
                    ctx.shadowColor = '#a78bfa';
                    ctx.shadowBlur = 8;
                    ctx.fillRect(x, sy, w, h);
                    ctx.shadowBlur = 0;
                    // arrows indicating movement
                    ctx.fillStyle = '#3a2a5a';
                    const arrowDir = plat.vx > 0 ? 1 : -1;
                    for (let i = 0; i < 3; i++) {
                        const ax = x + w / 2 + (i - 1) * 16;
                        const ay = sy + h / 2;
                        ctx.beginPath();
                        ctx.moveTo(ax, ay - 3);
                        ctx.lineTo(ax + arrowDir * 5, ay);
                        ctx.lineTo(ax, ay + 3);
                        ctx.closePath();
                        ctx.fill();
                    }
                    // zebra edges
                    this.drawZebraEdges(x, sy, w, h, '#6d4ed6');
                } else {
                    // Normal: orange with black-yellow zebra edges
                    ctx.fillStyle = '#ff8c1a';
                    ctx.shadowColor = '#ff8c1a';
                    ctx.shadowBlur = 6;
                    ctx.fillRect(x, sy, w, h);
                    ctx.shadowBlur = 0;
                    // inner gradient
                    const grad = ctx.createLinearGradient(0, sy, 0, sy + h);
                    grad.addColorStop(0, 'rgba(255, 200, 100, 0.4)');
                    grad.addColorStop(1, 'rgba(0, 0, 0, 0.3)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(x, sy, w, h);

                    this.drawZebraEdges(x, sy, w, h, '#b35e00');
                }
            },

            drawZebraEdges(x, sy, w, h, darkColor) {
                const stripeW = 4;
                ctx.fillStyle = darkColor;
                // left edge zebra
                for (let i = 0; i < 3; i++) {
                    if (i % 2 === 0) ctx.fillRect(x - 2, sy + i * 4, stripeW, 4);
                }
                // right edge zebra
                for (let i = 0; i < 3; i++) {
                    if (i % 2 === 0) ctx.fillRect(x + w - stripeW + 2, sy + i * 4, stripeW, 4);
                }
                // top hazard line
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(x, sy, w, 1);
            },

            drawPlayerTrail() {
                const p = this.player;
                if (!p) return;
                p.trail.forEach((t, i) => {
                    const alpha = (t.life / 14) * 0.4;
                    ctx.fillStyle = `rgba(255, 140, 26, ${alpha})`;
                    const sy = t.y - this.cameraY;
                    const r = 3 + i * 0.3;
                    ctx.beginPath();
                    ctx.arc(t.x, sy, r, 0, Math.PI * 2);
                    ctx.fill();
                });
            },

            drawPlayer() {
                const p = this.player;
                if (!p) return;
                const sx = p.x + p.w / 2;
                const sy = p.y + p.h / 2 - this.cameraY;

                // Glow
                ctx.shadowColor = '#ff8c1a';
                ctx.shadowBlur = 12;

                // Body (capsule-ish)
                ctx.fillStyle = '#ff8c1a';
                ctx.fillRect(p.x, p.y - this.cameraY, p.w, p.h);

                // Head highlight
                ctx.fillStyle = '#ffd080';
                ctx.fillRect(p.x + 4, p.y - this.cameraY + 2, p.w - 8, 6);

                // Eye (direction indicator)
                ctx.fillStyle = '#1a1a1a';
                const eyeX = p.facing > 0 ? p.x + p.w - 8 : p.x + 4;
                ctx.fillRect(eyeX, p.y - this.cameraY + 12, 4, 4);

                // Legs (animate with vertical motion)
                ctx.fillStyle = '#b35e00';
                const legSwing = Math.sin(this.timeAlive / 60) * 2;
                ctx.fillRect(p.x + 3, p.y - this.cameraY + p.h - 6, 6, 6 + legSwing);
                ctx.fillRect(p.x + p.w - 9, p.y - this.cameraY + p.h - 6, 6, 6 - legSwing);

                ctx.shadowBlur = 0;
            },

            drawDeathLine() {
                const lineScreenY = this.deathLineY - this.cameraY;
                if (lineScreenY > H + 10) return;  // not visible

                // Danger gradient above the line
                const gradHeight = Math.max(0, lineScreenY);
                if (gradHeight > 0) {
                    const grad = ctx.createLinearGradient(0, 0, 0, lineScreenY);
                    grad.addColorStop(0, 'rgba(255, 48, 48, 0.55)');
                    grad.addColorStop(0.6, 'rgba(255, 48, 48, 0.25)');
                    grad.addColorStop(1, 'rgba(255, 48, 48, 0.05)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, W, gradHeight);
                }

                // The red line itself (animated stripe)
                const blink = (Math.sin(this.timeAlive / 80) + 1) / 2;  // 0..1
                ctx.strokeStyle = `rgba(255, 48, 48, ${0.6 + blink * 0.4})`;
                ctx.lineWidth = 3;
                ctx.shadowColor = '#ff3030';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.moveTo(0, lineScreenY);
                ctx.lineTo(W, lineScreenY);
                ctx.stroke();

                // Diagonal hazard stripes along the line
                ctx.shadowBlur = 0;
                ctx.save();
                ctx.beginPath();
                ctx.rect(0, lineScreenY - 4, W, 8);
                ctx.clip();
                const offset = (this.timeAlive / 20) % 20;
                for (let x = -40; x < W + 40; x += 20) {
                    ctx.fillStyle = 'rgba(255, 48, 48, 0.6)';
                    ctx.beginPath();
                    ctx.moveTo(x + offset, lineScreenY - 6);
                    ctx.lineTo(x + offset + 8, lineScreenY - 6);
                    ctx.lineTo(x + offset + 16, lineScreenY + 6);
                    ctx.lineTo(x + offset + 8, lineScreenY + 6);
                    ctx.closePath();
                    ctx.fill();
                }
                ctx.restore();

                // "DEATH ZONE" label
                ctx.font = 'bold 12px "Share Tech Mono", monospace';
                ctx.fillStyle = '#ff3030';
                ctx.shadowColor = '#ff3030';
                ctx.shadowBlur = 8;
                ctx.textAlign = 'center';
                const blinkText = blink > 0.4 ? 1 : 0.4;
                ctx.globalAlpha = blinkText;
                ctx.fillText(i18n.t('death_zone'), W / 2, Math.max(14, lineScreenY - 8));
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
                ctx.textAlign = 'start';
            },

            drawMenu() {
                // Subtle descent animation: simulate falling particles in background
                if (!this._menuParticles) {
                    this._menuParticles = [];
                    for (let i = 0; i < 30; i++) {
                        this._menuParticles.push({
                            x: Math.random() * W,
                            y: Math.random() * H,
                            vy: 0.3 + Math.random() * 0.8,
                            r: 1 + Math.random() * 2
                        });
                    }
                }
                this._menuParticles.forEach(pt => {
                    pt.y += pt.vy;
                    if (pt.y > H) { pt.y = -10; pt.x = Math.random() * W; }
                    ctx.fillStyle = 'rgba(255, 140, 26, 0.3)';
                    ctx.fillRect(pt.x, pt.y, pt.r, pt.r * 3);
                });

                // Title
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff8c1a';
                ctx.shadowColor = '#ff8c1a';
                ctx.shadowBlur = 18;
                ctx.font = 'bold 48px "Black Ops One", sans-serif';
                ctx.fillText('TOWER', W / 2, H / 2 - 80);
                ctx.fillText('CLIMB', W / 2, H / 2 - 30);

                ctx.shadowBlur = 6;
                ctx.font = '14px "Share Tech Mono", monospace';
                ctx.fillStyle = '#8a7a5a';
                ctx.fillText('// DESCEND 100 FLOORS //', W / 2, H / 2 + 10);

                // Mock platform silhouette
                ctx.fillStyle = '#ff8c1a';
                ctx.shadowBlur = 8;
                ctx.fillRect(W / 2 - 80, H / 2 + 50, 160, 8);
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#b35e00';
                ctx.fillRect(W / 2 - 80, H / 2 + 50, 160, 1);

                // Press start
                const blink = (Math.sin(Date.now() / 350) + 1) / 2;
                ctx.globalAlpha = 0.5 + blink * 0.5;
                ctx.font = '14px "Share Tech Mono", monospace';
                ctx.fillStyle = '#ff8c1a';
                ctx.fillText(i18n.t('press_start'), W / 2, H / 2 + 110);
                ctx.globalAlpha = 1;
                ctx.textAlign = 'start';
            },

            drawGameOver() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
                ctx.fillRect(0, 0, W, H);

                ctx.textAlign = 'center';

                // Red overlay flash on top portion (where death line caught player)
                const grad = ctx.createLinearGradient(0, 0, 0, H * 0.5);
                grad.addColorStop(0, 'rgba(255, 48, 48, 0.3)');
                grad.addColorStop(1, 'rgba(255, 48, 48, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H * 0.5);

                ctx.fillStyle = '#ff3030';
                ctx.shadowColor = '#ff3030';
                ctx.shadowBlur = 20;
                ctx.font = 'bold 42px "Black Ops One", sans-serif';
                ctx.fillText(i18n.t('game_over'), W / 2, H / 2 - 40);

                ctx.shadowBlur = 4;
                ctx.font = '13px "Share Tech Mono", monospace';
                ctx.fillStyle = '#8a7a5a';
                ctx.fillText(i18n.t('game_over_sub'), W / 2, H / 2 - 10);

                // Stats
                ctx.font = 'bold 28px "Black Ops One", sans-serif';
                ctx.fillStyle = '#ff8c1a';
                ctx.shadowColor = '#ff8c1a';
                ctx.shadowBlur = 10;
                ctx.fillText(this.maxDepth + i18n.t('meters_unit'), W / 2, H / 2 + 35);

                ctx.font = '11px "Share Tech Mono", monospace';
                ctx.fillStyle = '#8a7a5a';
                ctx.shadowBlur = 0;
                ctx.fillText(i18n.t('depth').toUpperCase(), W / 2, H / 2 + 55);

                const blink = (Math.sin(Date.now() / 350) + 1) / 2;
                ctx.globalAlpha = 0.5 + blink * 0.5;
                ctx.fillStyle = '#ff8c1a';
                ctx.font = '13px "Share Tech Mono", monospace';
                ctx.fillText(i18n.t('press_retry'), W / 2, H / 2 + 100);
                ctx.globalAlpha = 1;

                ctx.textAlign = 'start';
            }
        };

        loop.start(
            (dt) => game.update(dt),
            () => game.draw()
        );
    </script>
</body>
</html>
